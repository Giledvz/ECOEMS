<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 110" width="600" height="110" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="600" height="110" fill="#ffffff"/>
  <!-- 5 cuadros (4 imagen + 1 con ?) -->
  <g transform="translate(20, 15)">
    <!-- Cuadro 1: triángulo arriba-izq apuntando hacia derecha, cuadrado abajo-der -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="80" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <polygon points="10,30 30,10 30,30" fill="#1a1a1a"/>
      <rect x="50" y="50" width="22" height="22" fill="#1a1a1a"/>
    </g>
    <!-- Cuadro 2 -->
    <g transform="translate(115, 0)">
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="80" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <polygon points="50,10 70,30 50,30" fill="#1a1a1a"/>
      <rect x="8" y="50" width="22" height="22" fill="#1a1a1a"/>
    </g>
    <!-- Cuadro 3 -->
    <g transform="translate(230, 0)">
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="80" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <polygon points="50,50 70,50 50,70" fill="#1a1a1a"/>
      <rect x="8" y="8" width="22" height="22" fill="#1a1a1a"/>
    </g>
    <!-- Cuadro 4 -->
    <g transform="translate(345, 0)">
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="0" y1="0" x2="80" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <line x1="80" y1="0" x2="0" y2="80" stroke="#cbd5e1" stroke-width="0.5" stroke-dasharray="3,3"/>
      <polygon points="10,50 30,50 30,70" fill="#1a1a1a"/>
      <rect x="50" y="8" width="22" height="22" fill="#1a1a1a"/>
    </g>
    <!-- Cuadro 5: ? -->
    <g transform="translate(460, 0)">
      <rect x="0" y="0" width="80" height="80" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="5,3"/>
      <text x="40" y="55" text-anchor="middle" font-size="40" font-weight="700">?</text>
    </g>
  </g>
</svg>
