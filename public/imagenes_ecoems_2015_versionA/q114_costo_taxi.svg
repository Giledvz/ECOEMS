<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="600" height="400" fill="#ffffff"/>

  <!-- Cuadrícula sutil -->
  <g stroke="#e5e7eb" stroke-width="0.4">
    <line x1="80" y1="100" x2="520" y2="100"/>
    <line x1="80" y1="140" x2="520" y2="140"/>
    <line x1="80" y1="180" x2="520" y2="180"/>
    <line x1="80" y1="220" x2="520" y2="220"/>
    <line x1="80" y1="260" x2="520" y2="260"/>
    <line x1="80" y1="300" x2="520" y2="300"/>
    <line x1="168" y1="60" x2="168" y2="340"/>
    <line x1="256" y1="60" x2="256" y2="340"/>
    <line x1="344" y1="60" x2="344" y2="340"/>
    <line x1="432" y1="60" x2="432" y2="340"/>
    <line x1="520" y1="60" x2="520" y2="340"/>
  </g>

  <!-- Marcador de flecha -->
  <defs>
    <marker id="arrowAxis" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- Ejes -->
  <line x1="80" y1="340" x2="545" y2="340" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#arrowAxis)"/>
  <line x1="80" y1="340" x2="80"  y2="50"  stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#arrowAxis)"/>

  <!-- Títulos de los ejes -->
  <text x="560" y="345" font-size="14" font-style="italic">d (km)</text>
  <text x="80" y="42" text-anchor="middle" font-size="14" font-style="italic">C (pesos)</text>

  <!-- Etiquetas eje Y -->
  <text x="72" y="344" text-anchor="end" font-size="12" font-style="italic">0</text>
  <text x="72" y="304" text-anchor="end" font-size="12" font-style="italic">10</text>
  <text x="72" y="264" text-anchor="end" font-size="12" font-style="italic">20</text>
  <text x="72" y="224" text-anchor="end" font-size="12" font-style="italic">30</text>
  <text x="72" y="184" text-anchor="end" font-size="12" font-style="italic">40</text>
  <text x="72" y="144" text-anchor="end" font-size="12" font-style="italic">50</text>
  <text x="72" y="104" text-anchor="end" font-size="12" font-style="italic">60</text>
  <text x="72" y="64"  text-anchor="end" font-size="12" font-style="italic">70</text>

  <!-- Etiquetas eje X -->
  <text x="80"  y="358" text-anchor="middle" font-size="12" font-style="italic">0</text>
  <text x="168" y="358" text-anchor="middle" font-size="13" font-weight="700">2</text>
  <text x="256" y="358" text-anchor="middle" font-size="12" font-style="italic">4</text>
  <text x="344" y="358" text-anchor="middle" font-size="12" font-style="italic">6</text>
  <text x="432" y="358" text-anchor="middle" font-size="13" font-weight="700">8</text>
  <text x="520" y="358" text-anchor="middle" font-size="12" font-style="italic">10</text>

  <!-- Línea (recta) C = 5d + 20: pasa por (0, 20) y (10, 70) -->
  <line x1="80" y1="260" x2="520" y2="60" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Líneas auxiliares punteadas desde A y B -->
  <line x1="168" y1="220" x2="168" y2="340" stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="80"  y1="220" x2="168" y2="220" stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="432" y1="100" x2="432" y2="340" stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="3,3"/>
  <line x1="80"  y1="100" x2="432" y2="100" stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="3,3"/>

  <!-- Puntos A y B -->
  <circle cx="168" cy="220" r="4.5" fill="#1a1a1a"/>
  <circle cx="432" cy="100" r="4.5" fill="#1a1a1a"/>

  <!-- Etiquetas A y B con sus coordenadas -->
  <text x="160" y="210" text-anchor="end" font-size="17" font-weight="700">A</text>
  <text x="440" y="92"  text-anchor="start" font-size="17" font-weight="700">B</text>
</svg>
