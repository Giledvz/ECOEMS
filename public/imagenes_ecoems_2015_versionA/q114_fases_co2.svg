<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Cuadrícula sutil -->
  <g stroke="#e5e7eb" stroke-width="0.4">
    <line x1="90" y1="80"  x2="510" y2="80"/>
    <line x1="90" y1="120" x2="510" y2="120"/>
    <line x1="90" y1="160" x2="510" y2="160"/>
    <line x1="90" y1="200" x2="510" y2="200"/>
    <line x1="90" y1="240" x2="510" y2="240"/>
    <line x1="90" y1="280" x2="510" y2="280"/>
    <line x1="150" y1="60" x2="150" y2="330"/>
    <line x1="200" y1="60" x2="200" y2="330"/>
    <line x1="250" y1="60" x2="250" y2="330"/>
    <line x1="300" y1="60" x2="300" y2="330"/>
    <line x1="400" y1="60" x2="400" y2="330"/>
    <line x1="450" y1="60" x2="450" y2="330"/>
  </g>

  <!-- Marcador de flecha -->
  <defs>
    <marker id="arrowAxis" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0,0 10,4 0,8" fill="currentColor"/>
    </marker>
  </defs>

  <!-- Ejes -->
  <line x1="90" y1="330" x2="525" y2="330" stroke="currentColor" stroke-width="1.8" marker-end="url(#arrowAxis)"/>
  <line x1="90" y1="330" x2="90"  y2="55"  stroke="currentColor" stroke-width="1.8" marker-end="url(#arrowAxis)"/>

  <!-- Títulos de los ejes -->
  <text x="540" y="334" font-size="13" font-style="italic">T (°C)</text>
  <text x="38"  y="195" text-anchor="middle" font-size="13" transform="rotate(-90 38 195)">Presión, atm</text>
  <text x="300" y="385" text-anchor="middle" font-size="13">Temperatura, °C</text>

  <!-- Etiquetas eje X (numéricas) -->
  <text x="96"  y="348" text-anchor="middle" font-size="13" font-style="italic">-57</text>
  <text x="322" y="348" text-anchor="middle" font-size="13" font-style="italic">20</text>
  <text x="354" y="348" text-anchor="middle" font-size="13" font-style="italic">31</text>

  <!-- Etiquetas eje Y (numéricas) -->
  <text x="82" y="258" text-anchor="end" font-size="13" font-style="italic">52</text>
  <text x="82" y="240" text-anchor="end" font-size="13" font-style="italic">56</text>
  <text x="82" y="168" text-anchor="end" font-size="13" font-style="italic">73</text>

  <!-- Símbolos T_t, T_c, P_t, P_c -->
  <text x="96"  y="365" text-anchor="middle" font-size="14" font-style="italic">T<tspan font-size="9" baseline-shift="sub">t</tspan></text>
  <text x="354" y="365" text-anchor="middle" font-size="14" font-style="italic">T<tspan font-size="9" baseline-shift="sub">c</tspan></text>
  <text x="60" y="258" text-anchor="middle" font-size="14" font-style="italic">P<tspan font-size="9" baseline-shift="sub">t</tspan></text>
  <text x="60" y="168" text-anchor="middle" font-size="14" font-style="italic">P<tspan font-size="9" baseline-shift="sub">c</tspan></text>

  <!-- Líneas auxiliares (dashed) -->
  <!-- Punto triple (96, 254) -->
  <line x1="90" y1="254" x2="96" y2="254" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="96" y1="254" x2="96" y2="330" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Intermedio (322, 236) -->
  <line x1="90"  y1="236" x2="322" y2="236" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="322" y1="236" x2="322" y2="330" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>
  <!-- Punto crítico (354, 164) -->
  <line x1="90"  y1="164" x2="354" y2="164" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>
  <line x1="354" y1="164" x2="354" y2="330" stroke="currentColor" stroke-width="0.5" stroke-dasharray="3,3"/>

  <!-- Curva sublimación (S/V): Clausius-Clapeyron realista -->
  <path d="M 90.0,286.0
           L 92.0,279.0
           L 93.5,272.0
           L 94.8,264.0
           L 96.0,254.0"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>

  <!-- Curva fusión (S/L): pendiente positiva (~8 atm/°C), casi vertical con ligera inclinación derecha -->
  <path d="M 96.0,254.0
           L 99.0,219.7
           L 102.0,185.4
           L 105.0,151.1
           L 108.0,116.9
           L 111.0,82.6
           L 112.0,70.0"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>

  <!-- Curva vaporización (L/V): P(T) = 52 + 0.196·exp(0.1508·T) -->
  <path d="M 96.0,254.00
           L 145.8,254.00
           L 204.5,253.96
           L 263.1,253.16
           L 292.4,250.20
           L 307.1,245.93
           L 315.9,241.32
           L 321.8,236.85
           L 327.6,230.82
           L 333.5,222.65
           L 339.4,211.63
           L 345.2,196.72
           L 348.2,187.37
           L 351.1,176.55
           L 354.0,164.00"
        fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>

  <!-- Puntos de referencia (dots) -->
  <circle cx="96"  cy="254" r="3.5" fill="currentColor"/>
  <circle cx="322" cy="236" r="3.5" fill="currentColor"/>
  <circle cx="354" cy="164" r="3.5" fill="currentColor"/>

  <!-- Etiquetas de los puntos -->
  <text x="115" y="278" font-size="13" font-style="italic">Punto triple</text>
  <text x="370" y="160" font-size="13" font-style="italic">Punto crítico</text>

  <!-- Etiquetas de regiones (grandes, en itálicas) -->
  <text x="135" y="160" font-size="22" font-style="italic">Sólido</text>
  <text x="220" y="200" font-size="22" font-style="italic">Líquido</text>
  <text x="430" y="270" font-size="22" font-style="italic">Vapor</text>
</svg>
