<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 120" width="720" height="120" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="720" height="120" fill="#ffffff"/>

  <!-- Bloque 1: 6, 8, 11, 15, 20 -->
  <g transform="translate(10, 20)">
    <path d="M 0 75 L 40 75 L 40 50 L 80 50 L 80 25 L 120 25 L 120 50 L 160 50 L 160 75 L 200 75"
          fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="20" y="70" text-anchor="middle" font-size="18">6</text>
    <text x="60" y="45" text-anchor="middle" font-size="18">8</text>
    <text x="100" y="20" text-anchor="middle" font-size="18">11</text>
    <text x="140" y="45" text-anchor="middle" font-size="18">15</text>
    <text x="180" y="70" text-anchor="middle" font-size="18">20</text>
  </g>

  <!-- Bloque 2: -1, 1, 4, 8, 13 -->
  <g transform="translate(260, 20)">
    <path d="M 0 75 L 40 75 L 40 50 L 80 50 L 80 25 L 120 25 L 120 50 L 160 50 L 160 75 L 200 75"
          fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="20" y="70" text-anchor="middle" font-size="18">-1</text>
    <text x="60" y="45" text-anchor="middle" font-size="18">1</text>
    <text x="100" y="20" text-anchor="middle" font-size="18">4</text>
    <text x="140" y="45" text-anchor="middle" font-size="18">8</text>
    <text x="180" y="70" text-anchor="middle" font-size="18">13</text>
  </g>

  <!-- Bloque 3: ?, -3, 0, 4, 9 -->
  <g transform="translate(510, 20)">
    <path d="M 0 75 L 40 75 L 40 50 L 80 50 L 80 25 L 120 25 L 120 50 L 160 50 L 160 75 L 200 75"
          fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="20" y="72" text-anchor="middle" font-size="22" font-weight="700">?</text>
    <text x="60" y="45" text-anchor="middle" font-size="18">-3</text>
    <text x="100" y="20" text-anchor="middle" font-size="18">0</text>
    <text x="140" y="45" text-anchor="middle" font-size="18">4</text>
    <text x="180" y="70" text-anchor="middle" font-size="18">9</text>
  </g>
</svg>
