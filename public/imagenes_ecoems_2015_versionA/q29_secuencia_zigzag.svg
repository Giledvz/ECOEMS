<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" width="720" height="200" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="720" height="200" fill="#ffffff"/>

  <!-- Bloque 1: 6 - 8 - 11 - 15 - 20 (zigzag) -->
  <g transform="translate(20, 60)">
    <!-- Trazo zigzag: abajo→arriba→arriba→abajo→abajo -->
    <line x1="0" y1="60" x2="40" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="40" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="20" x2="100" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="20" x2="100" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="60" x2="160" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="60" x2="160" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="-5" y="80" text-anchor="end" font-size="18">6</text>
    <text x="65" y="15" text-anchor="middle" font-size="18">8</text>
    <text x="80" y="-5" text-anchor="middle" font-size="18">11</text>
    <text x="125" y="15" text-anchor="middle" font-size="18">15</text>
    <text x="205" y="15" text-anchor="start" font-size="18">20</text>
  </g>

  <!-- Bloque 2: -1 - 1 - 4 - 8 - 13 -->
  <g transform="translate(260, 60)">
    <line x1="0" y1="60" x2="40" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="40" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="20" x2="100" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="20" x2="100" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="60" x2="160" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="60" x2="160" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="-5" y="80" text-anchor="end" font-size="18">-1</text>
    <text x="65" y="15" text-anchor="middle" font-size="18">1</text>
    <text x="80" y="-5" text-anchor="middle" font-size="18">4</text>
    <text x="125" y="15" text-anchor="middle" font-size="18">8</text>
    <text x="205" y="15" text-anchor="start" font-size="18">13</text>
  </g>

  <!-- Bloque 3: ? - -3 - 0 - 4 - 9 -->
  <g transform="translate(500, 60)">
    <line x1="0" y1="60" x2="40" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="60" x2="40" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="20" x2="100" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="20" x2="100" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="100" y1="60" x2="160" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="60" x2="160" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="160" y1="0" x2="200" y2="0" stroke="#1a1a1a" stroke-width="1.5"/>
    <text x="-5" y="80" text-anchor="end" font-size="22" font-weight="700">?</text>
    <text x="65" y="15" text-anchor="middle" font-size="18">-3</text>
    <text x="80" y="-5" text-anchor="middle" font-size="18">0</text>
    <text x="125" y="15" text-anchor="middle" font-size="18">4</text>
    <text x="205" y="15" text-anchor="start" font-size="18">9</text>
  </g>
</svg>
