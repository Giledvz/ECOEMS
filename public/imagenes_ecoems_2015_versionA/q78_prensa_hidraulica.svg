<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" width="360" height="320" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="360" height="320" fill="#ffffff"/>

  <!-- Cuerpo de la prensa hidráulica (tubo en U) -->
  <!-- Pared exterior -->
  <path d="M 50 80
           L 50 270
           L 320 270
           L 320 130
           L 270 130
           L 270 270
           L 100 270
           L 100 80 Z" fill="#e0e7ff" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Émbolo pequeño (izquierda) -->
  <rect x="50" y="105" width="50" height="20" fill="#94a3b8" stroke="#1a1a1a" stroke-width="1.5"/>
  <!-- Vástago émbolo pequeño -->
  <rect x="68" y="65" width="14" height="40" fill="#475569" stroke="#1a1a1a" stroke-width="1.2"/>

  <!-- Émbolo grande (derecha, arriba con auto) -->
  <rect x="270" y="155" width="50" height="20" fill="#94a3b8" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Auto encima del émbolo grande (silueta simple) -->
  <g transform="translate(248, 110)">
    <rect x="0" y="20" width="94" height="18" fill="#cbd5e1" stroke="#1a1a1a" stroke-width="1.2"/>
    <path d="M 18 20 L 28 5 L 70 5 L 80 20 Z" fill="#cbd5e1" stroke="#1a1a1a" stroke-width="1.2"/>
    <circle cx="22" cy="42" r="6" fill="#1f2937" stroke="#1a1a1a"/>
    <circle cx="74" cy="42" r="6" fill="#1f2937" stroke="#1a1a1a"/>
  </g>

  <!-- Flecha F1 (apuntando hacia abajo sobre el pistón pequeño) -->
  <line x1="75" y1="35" x2="75" y2="60" stroke="#dc2626" stroke-width="2.2" marker-end="url(#arrowDown)"/>
  <text x="92" y="50" font-size="18" font-style="italic" fill="#dc2626">F₁</text>

  <!-- Flecha F2 (apuntando hacia arriba bajo el pistón grande, dentro del fluido) -->
  <line x1="295" y1="240" x2="295" y2="195" stroke="#16a34a" stroke-width="2.2" marker-end="url(#arrowUp)"/>
  <text x="305" y="225" font-size="18" font-style="italic" fill="#16a34a">F₂</text>

  <!-- Etiquetas A1 y A2 (áreas) -->
  <text x="120" y="120" font-size="16" font-style="italic" fill="#1d4ed8">A₁</text>
  <text x="218" y="170" font-size="16" font-style="italic" fill="#1d4ed8">A₂</text>

  <defs>
    <marker id="arrowDown" markerWidth="10" markerHeight="10" refX="5" refY="8" orient="auto">
      <polygon points="0,0 10,0 5,9" fill="#dc2626"/>
    </marker>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="2" orient="auto">
      <polygon points="0,9 10,9 5,1" fill="#16a34a"/>
    </marker>
  </defs>
</svg>
