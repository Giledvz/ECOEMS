<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 220" width="460" height="220" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Símbolos: Na S Na -->
  <text x="100" y="120" text-anchor="middle" font-size="44" font-weight="600">Na</text>
  <text x="230" y="120" text-anchor="middle" font-size="44" font-weight="600">S</text>
  <text x="360" y="120" text-anchor="middle" font-size="44" font-weight="600">Na</text>

  <!-- Pares de electrones (puntos) alrededor del S: 6 electrones de valencia -->
  <!-- Arriba (par) -->
  <circle cx="220" cy="78" r="4" fill="currentColor"/>
  <circle cx="240" cy="78" r="4" fill="currentColor"/>
  <!-- Abajo (par) -->
  <circle cx="220" cy="148" r="4" fill="currentColor"/>
  <circle cx="240" cy="148" r="4" fill="currentColor"/>
  <!-- Izquierda (par compartido con Na): cross arriba (Na) + dot abajo (S) -->
  <line x1="175" y1="100" x2="185" y2="110" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="110" x2="185" y2="100" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="180" cy="125" r="4" fill="currentColor"/>
  <!-- Derecha (par compartido con Na): cross arriba (Na) + dot abajo (S) -->
  <line x1="275" y1="100" x2="285" y2="110" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <line x1="275" y1="110" x2="285" y2="100" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <circle cx="280" cy="125" r="4" fill="currentColor"/>

  <!-- Etiqueta -->
  <text x="230" y="195" text-anchor="middle" font-size="16" font-style="italic">Sulfuro de sodio</text>
</svg>
