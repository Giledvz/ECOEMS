<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="200" height="200" fill="#ffffff"/>
  <g transform="translate(40, 30)">
    <!-- Cubo isométrico -->
    <polygon points="0,40 60,10 120,40 60,70" fill="#e2e8f0" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="0,40 60,70 60,140 0,110" fill="#cbd5e1" stroke="#1a1a1a" stroke-width="1.5"/>
    <polygon points="60,70 120,40 120,110 60,140" fill="#94a3b8" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Pentágono en cara frontal-izq -->
    <polygon points="30,95 41,103 37,116 23,116 19,103" fill="#1a1a1a" transform="rotate(-8 30 105)"/>
    <!-- Triángulo en cara frontal-der -->
    <polygon points="80,82 92,94 80,106" fill="#1a1a1a" transform="rotate(8 88 94)"/>
    <!-- Doble línea en cara superior -->
    <line x1="20" y1="35" x2="38" y2="25" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="22" y1="40" x2="40" y2="30" stroke="#1a1a1a" stroke-width="1.5"/>
  </g>
</svg>
