<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" width="600" height="320" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="600" height="320" fill="#ffffff"/>

  <!-- 1. Evaporación: matraz sobre mechero -->
  <g transform="translate(50, 30)">
    <line x1="0" y1="160" x2="80" y2="160" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="40" y1="160" x2="40" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
    <ellipse cx="40" cy="80" rx="22" ry="8" fill="#bfdbfe" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 25 80 Q 25 50, 40 50 Q 55 50, 55 80" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- vapor -->
    <path d="M 33 50 Q 36 40 33 30" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 40 50 Q 43 38 40 26" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 47 50 Q 50 40 47 30" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <!-- mechero -->
    <rect x="30" y="120" width="20" height="30" fill="#475569" stroke="#1a1a1a"/>
    <path d="M 33 120 Q 40 105 47 120" fill="#fbbf24" stroke="#dc2626" stroke-width="1"/>
    <text x="40" y="195" text-anchor="middle" font-size="14" font-weight="600">Evaporación</text>
  </g>

  <!-- 2. Filtración: matraz con embudo y filtro -->
  <g transform="translate(165, 30)">
    <!-- Embudo -->
    <polygon points="20,40 80,40 56,90 44,90" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Tubo -->
    <rect x="44" y="90" width="12" height="20" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Matraz Erlenmeyer -->
    <path d="M 30 110 L 25 165 L 75 165 L 70 110 Z" fill="#bfdbfe" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Líquido -->
    <path d="M 28 145 L 27 165 L 73 165 L 72 145 Z" fill="#3b82f6" stroke="none"/>
    <text x="50" y="195" text-anchor="middle" font-size="14" font-weight="600">Filtración</text>
  </g>

  <!-- 3. Decantación: embudo separador -->
  <g transform="translate(280, 30)">
    <!-- Embudo separador -->
    <ellipse cx="50" cy="40" rx="22" ry="6" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.5"/>
    <path d="M 28 40 Q 28 100 50 130 Q 72 100 72 40" fill="#fecaca" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Línea de separación -->
    <path d="M 30 90 Q 50 95 70 90" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    <path d="M 30 90 Q 50 100 70 90 L 72 100 Q 50 110 28 100 Z" fill="#3b82f6" stroke="#1a1a1a" stroke-width="1"/>
    <!-- Llave -->
    <rect x="46" y="130" width="8" height="14" fill="#475569" stroke="#1a1a1a"/>
    <rect x="38" y="135" width="24" height="4" fill="#475569"/>
    <text x="50" y="195" text-anchor="middle" font-size="14" font-weight="600">Decantación</text>
  </g>

  <!-- 4. Destilación: matraz + condensador (esquemático) -->
  <g transform="translate(395, 30)">
    <line x1="0" y1="160" x2="50" y2="160" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Matraz fuente -->
    <ellipse cx="25" cy="100" rx="22" ry="22" fill="#bfdbfe" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="25" y1="78" x2="25" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Codo -->
    <line x1="25" y1="60" x2="80" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Condensador inclinado -->
    <line x1="80" y1="60" x2="115" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
    <line x1="80" y1="68" x2="115" y2="108" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Matraz colector -->
    <path d="M 100 110 L 95 145 L 130 145 L 125 110 Z" fill="#bfdbfe" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Mechero -->
    <rect x="15" y="130" width="20" height="22" fill="#475569" stroke="#1a1a1a"/>
    <path d="M 18 130 Q 25 118 32 130" fill="#fbbf24" stroke="#dc2626" stroke-width="1"/>
    <text x="65" y="195" text-anchor="middle" font-size="14" font-weight="600">Destilación</text>
  </g>

  <!-- 5. Tamizado: tamiz con partículas -->
  <g transform="translate(500, 30)">
    <!-- Tamiz: rectángulo inclinado con malla -->
    <polygon points="10,80 80,40 90,60 20,100" fill="#e5e7eb" stroke="#1a1a1a" stroke-width="1.5"/>
    <!-- Líneas de la malla -->
    <line x1="20" y1="92" x2="80" y2="55" stroke="#1a1a1a" stroke-width="0.5"/>
    <line x1="22" y1="98" x2="82" y2="61" stroke="#1a1a1a" stroke-width="0.5"/>
    <!-- Partículas -->
    <circle cx="30" cy="78" r="3" fill="#1a1a1a"/>
    <circle cx="45" cy="70" r="2" fill="#1a1a1a"/>
    <circle cx="55" cy="63" r="3.5" fill="#1a1a1a"/>
    <circle cx="65" cy="56" r="2.5" fill="#1a1a1a"/>
    <!-- Cono debajo -->
    <polygon points="22,100 90,60 60,140" fill="#fde68a" stroke="#1a1a1a" stroke-width="1"/>
    <text x="50" y="195" text-anchor="middle" font-size="14" font-weight="600">Tamizado</text>
  </g>
</svg>
