<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="600" height="380" fill="#ffffff"/>

  <!-- ───── Secuencia 1: triángulos (casi equiláteros) ───── -->
  <g transform="translate(40, 20)">
    <!-- Triángulo 1: 14, 7, 2 -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="160" height="140" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="80" y2="10" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="10" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="72" x2="80" y2="115" stroke="#1a1a1a" stroke-width="0.8"/>
      <line x1="45" y1="72" x2="115" y2="72" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20">14</text>
      <text x="56" y="100" text-anchor="middle" font-size="20">7</text>
      <text x="104" y="100" text-anchor="middle" font-size="20">2</text>
    </g>
    <!-- Triángulo 2: 40, 8, 5 -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="160" height="140" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="80" y2="10" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="10" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="72" x2="80" y2="115" stroke="#1a1a1a" stroke-width="0.8"/>
      <line x1="45" y1="72" x2="115" y2="72" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20">40</text>
      <text x="56" y="100" text-anchor="middle" font-size="20">8</text>
      <text x="104" y="100" text-anchor="middle" font-size="20">5</text>
    </g>
    <!-- Triángulo 3: 36, 4, x -->
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="160" height="140" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="80" y2="10" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="10" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="115" x2="140" y2="115" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="72" x2="80" y2="115" stroke="#1a1a1a" stroke-width="0.8"/>
      <line x1="45" y1="72" x2="115" y2="72" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20">36</text>
      <text x="56" y="100" text-anchor="middle" font-size="20">4</text>
      <text x="104" y="100" text-anchor="middle" font-size="20" font-style="italic" font-weight="700">x</text>
    </g>
  </g>

  <!-- ───── Secuencia 2: círculos ───── -->
  <g transform="translate(40, 210)">
    <!-- Círculo 1: 12, 3, 3, 2 -->
    <g transform="translate(0, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20">12</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">3</text>
      <text x="55" y="100" text-anchor="middle" font-size="20">3</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">2</text>
    </g>
    <!-- Círculo 2: 28, 4, 3, 4 -->
    <g transform="translate(180, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20">28</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">4</text>
      <text x="55" y="100" text-anchor="middle" font-size="20">3</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">4</text>
    </g>
    <!-- Círculo 3: 15, 2, y, 3 -->
    <g transform="translate(360, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20">15</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">2</text>
      <text x="55" y="100" text-anchor="middle" font-size="20" font-style="italic" font-weight="700">y</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">3</text>
    </g>
  </g>
</svg>
