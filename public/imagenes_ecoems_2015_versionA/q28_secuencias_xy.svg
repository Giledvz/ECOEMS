<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" width="600" height="360" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="600" height="360" fill="#ffffff"/>

  <!-- ───── Secuencia 1: triángulos con número arriba y dos abajo ───── -->
  <g transform="translate(40, 30)">
    <!-- Triángulo 1: 14 arriba, 7 y 2 abajo -->
    <g transform="translate(0, 0)">
      <rect x="0" y="0" width="160" height="120" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="80" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="80" y2="100" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20" font-weight="700">14</text>
      <text x="55" y="115" text-anchor="middle" font-size="20">7</text>
      <text x="105" y="115" text-anchor="middle" font-size="20">2</text>
    </g>
    <!-- Triángulo 2: 40, 8 y 5 -->
    <g transform="translate(180, 0)">
      <rect x="0" y="0" width="160" height="120" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="80" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="80" y2="100" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20" font-weight="700">40</text>
      <text x="55" y="115" text-anchor="middle" font-size="20">8</text>
      <text x="105" y="115" text-anchor="middle" font-size="20">5</text>
    </g>
    <!-- Triángulo 3: 36, 4 y x -->
    <g transform="translate(360, 0)">
      <rect x="0" y="0" width="160" height="120" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="80" y2="20" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="100" x2="140" y2="100" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="80" y1="20" x2="80" y2="100" stroke="#1a1a1a" stroke-width="0.8"/>
      <text x="80" y="55" text-anchor="middle" font-size="20" font-weight="700">36</text>
      <text x="55" y="115" text-anchor="middle" font-size="20">4</text>
      <text x="105" y="115" text-anchor="middle" font-size="20" font-style="italic">x</text>
    </g>
  </g>

  <!-- ───── Secuencia 2: círculos divididos en 4 cuadrantes ───── -->
  <g transform="translate(40, 180)">
    <!-- Círculo 1: 12,3,3,2 -->
    <g transform="translate(0, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20" font-weight="700">12</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">3</text>
      <text x="55" y="100" text-anchor="middle" font-size="20">3</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">2</text>
    </g>
    <!-- Círculo 2: 28,4,3,4 -->
    <g transform="translate(180, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20" font-weight="700">28</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">4</text>
      <text x="55" y="100" text-anchor="middle" font-size="20">3</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">4</text>
    </g>
    <!-- Círculo 3: 15,2,y,3 -->
    <g transform="translate(360, 0)">
      <circle cx="80" cy="70" r="60" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
      <line x1="20" y1="70" x2="140" y2="70" stroke="#1a1a1a" stroke-width="1"/>
      <line x1="80" y1="10" x2="80" y2="130" stroke="#1a1a1a" stroke-width="1"/>
      <text x="55" y="50" text-anchor="middle" font-size="20" font-weight="700">15</text>
      <text x="105" y="50" text-anchor="middle" font-size="20">2</text>
      <text x="55" y="100" text-anchor="middle" font-size="20" font-style="italic">y</text>
      <text x="105" y="100" text-anchor="middle" font-size="20">3</text>
    </g>
  </g>
</svg>
