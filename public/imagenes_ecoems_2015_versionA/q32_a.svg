<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 130 170" width="130" height="170" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="130" height="170" fill="#ffffff"/>
  <g transform="translate(5, 5)">
    <!-- Cruz de la red del cubo -->
    <rect x="40" y="0" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="0" y="40" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="40" y="40" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="80" y="40" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="40" y="80" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>
    <rect x="40" y="120" width="40" height="40" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>

    <!-- T: pentágono grande (vértice abajo), gris -->
    <polygon points="60,36 75.22,24.94 69.41,7.06 50.59,7.06 44.78,24.94" fill="#555555"/>

    <!-- B1: triángulo apuntando a la izquierda, base = lado derecho del cuadro, apex toca el lado izquierdo -->
    <polygon points="80,80 80,120 40,100" fill="#1a1a1a"/>

    <!-- B2: dos barras horizontales, gap arriba = gap entre barras (3 px) -->
    <rect x="40" y="123" width="40" height="5" fill="#1a1a1a"/>
    <rect x="40" y="131" width="40" height="5" fill="#1a1a1a"/>
  </g>
</svg>
