<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140" width="220" height="171" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <!-- Cubo isométrico s=20. Origen: vértice frontal inferior.
         Convención (X,Y,Z) 1-indexed: (1,1,1) = (90,110);
         dX=(17.32,-10), dY=(-17.32,-10), dZ=(0,-20). -->
    <g id="cube">
      <polygon points="0,-20 17.32,-30 0,-40 -17.32,-30" fill="#efe7d8" stroke="#1f1a16" stroke-width="1.5" stroke-linejoin="bevel"/>
      <polygon points="0,0 -17.32,-10 -17.32,-30 0,-20" fill="#c9bda3" stroke="#1f1a16" stroke-width="1.5" stroke-linejoin="bevel"/>
      <polygon points="0,0 17.32,-10 17.32,-30 0,-20" fill="#a89880" stroke="#1f1a16" stroke-width="1.5" stroke-linejoin="bevel"/>
    </g>
  </defs>
  <!-- Figura: 211, 121, 222, 321 -->
  <use href="#cube" transform="translate(72.68, 100)"/>  <!-- (1,2,1) -->
  <use href="#cube" transform="translate(107.32, 80)"/>  <!-- (3,2,1) -->
  <use href="#cube" transform="translate(90, 70)"/>      <!-- (2,2,2) -->
  <use href="#cube" transform="translate(107.32, 100)"/> <!-- (2,1,1) -->
</svg>
