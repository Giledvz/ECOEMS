      <line x1="82" y1="77" x2="118" y2="113"/>
      <line x1="118" y1="77" x2="82" y2="113"/>
    </g>
    <circle cx="179.89" cy="69.04" r="4.5" fill="currentColor"/>
    <circle cx="20.11" cy="120.96" r="4.5" fill="currentColor"/>
    <polygon points="100,174 155,190 45,190" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="miter"/>
    <text x="100" y="210" font-size="15" text-anchor="middle" fill="currentColor">38</text>
  </g>
  <g transform="translate(220, 0)">
