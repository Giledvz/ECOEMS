    <polygon points="141.14,38.37 166.57,116.63 100,165 33.43,116.63 58.86,38.37" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="miter"/>
    <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round">
      <line x1="82" y1="77" x2="118" y2="113"/>
      <line x1="118" y1="77" x2="82" y2="113"/>
    </g>
    <circle cx="50.63" cy="162.96" r="4.5" fill="currentColor"/>
    <circle cx="149.37" cy="27.04" r="4.5" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <polygon points="100,174 155,190 45,190" stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="miter"/>
