<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 210" width="300" height="225" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Triángulo con sus tres medianas (vértice → punto medio del lado opuesto). -->
  <polygon points="140,25 40,185 240,185" stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="miter"/>
  <g stroke="currentColor" stroke-width="1.6">
    <line x1="140" y1="25" x2="140" y2="185"/>
    <line x1="40" y1="185" x2="190" y2="105"/>
    <line x1="240" y1="185" x2="90" y2="105"/>
  </g>
</svg>
