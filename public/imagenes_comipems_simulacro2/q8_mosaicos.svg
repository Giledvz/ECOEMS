<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 144" width="460" height="144" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- 3 pirámides de cuadrados centradas, intercalando mosaicos (oscuros) y huecos.
     Cada pirámide tiene n pisos donde el piso k tiene 2k-1 cuadrados con patrón
     D L D L ... D (alternados empezando con D). Mosaicos = T(n), huecos = T(n-1).
     F1 n=3 → 6 mosaicos, 3 huecos. F2 n=4 → 10, 6. F3 n=5 → 15, 10. -->

  <style>
    .mosaico { fill: currentColor; stroke: currentColor; stroke-width: 1.4; }
    .hueco   { fill: none; stroke: currentColor; stroke-width: 1.4; }
  </style>

  <!-- Figura 1: 3 pisos (1, 3, 5), centro x=60, base y=110, lado 16 -->
  <!-- Piso 1 (cima) -->
  <rect class="mosaico" x="52" y="62" width="16" height="16"/>
  <!-- Piso 2 -->
  <rect class="mosaico" x="36" y="78" width="16" height="16"/>
  <rect class="hueco"   x="52" y="78" width="16" height="16"/>
  <rect class="mosaico" x="68" y="78" width="16" height="16"/>
  <!-- Piso 3 (base) -->
  <rect class="mosaico" x="20" y="94" width="16" height="16"/>
  <rect class="hueco"   x="36" y="94" width="16" height="16"/>
  <rect class="mosaico" x="52" y="94" width="16" height="16"/>
  <rect class="hueco"   x="68" y="94" width="16" height="16"/>
  <rect class="mosaico" x="84" y="94" width="16" height="16"/>

  <!-- Figura 2: 4 pisos (1, 3, 5, 7), centro x=186, base y=110 -->
  <!-- Piso 1 -->
  <rect class="mosaico" x="178" y="46" width="16" height="16"/>
  <!-- Piso 2 -->
  <rect class="mosaico" x="162" y="62" width="16" height="16"/>
  <rect class="hueco"   x="178" y="62" width="16" height="16"/>
  <rect class="mosaico" x="194" y="62" width="16" height="16"/>
  <!-- Piso 3 -->
  <rect class="mosaico" x="146" y="78" width="16" height="16"/>
  <rect class="hueco"   x="162" y="78" width="16" height="16"/>
  <rect class="mosaico" x="178" y="78" width="16" height="16"/>
  <rect class="hueco"   x="194" y="78" width="16" height="16"/>
  <rect class="mosaico" x="210" y="78" width="16" height="16"/>
  <!-- Piso 4 (base) -->
  <rect class="mosaico" x="130" y="94" width="16" height="16"/>
  <rect class="hueco"   x="146" y="94" width="16" height="16"/>
  <rect class="mosaico" x="162" y="94" width="16" height="16"/>
  <rect class="hueco"   x="178" y="94" width="16" height="16"/>
  <rect class="mosaico" x="194" y="94" width="16" height="16"/>
  <rect class="hueco"   x="210" y="94" width="16" height="16"/>
  <rect class="mosaico" x="226" y="94" width="16" height="16"/>

  <!-- Figura 3: 5 pisos (1, 3, 5, 7, 9), centro x=344, base y=110 -->
  <!-- Piso 1 -->
  <rect class="mosaico" x="336" y="30" width="16" height="16"/>
  <!-- Piso 2 -->
  <rect class="mosaico" x="320" y="46" width="16" height="16"/>
  <rect class="hueco"   x="336" y="46" width="16" height="16"/>
  <rect class="mosaico" x="352" y="46" width="16" height="16"/>
  <!-- Piso 3 -->
  <rect class="mosaico" x="304" y="62" width="16" height="16"/>
  <rect class="hueco"   x="320" y="62" width="16" height="16"/>
  <rect class="mosaico" x="336" y="62" width="16" height="16"/>
  <rect class="hueco"   x="352" y="62" width="16" height="16"/>
  <rect class="mosaico" x="368" y="62" width="16" height="16"/>
  <!-- Piso 4 -->
  <rect class="mosaico" x="288" y="78" width="16" height="16"/>
  <rect class="hueco"   x="304" y="78" width="16" height="16"/>
  <rect class="mosaico" x="320" y="78" width="16" height="16"/>
  <rect class="hueco"   x="336" y="78" width="16" height="16"/>
  <rect class="mosaico" x="352" y="78" width="16" height="16"/>
  <rect class="hueco"   x="368" y="78" width="16" height="16"/>
  <rect class="mosaico" x="384" y="78" width="16" height="16"/>
  <!-- Piso 5 (base) -->
  <rect class="mosaico" x="272" y="94" width="16" height="16"/>
  <rect class="hueco"   x="288" y="94" width="16" height="16"/>
  <rect class="mosaico" x="304" y="94" width="16" height="16"/>
  <rect class="hueco"   x="320" y="94" width="16" height="16"/>
  <rect class="mosaico" x="336" y="94" width="16" height="16"/>
  <rect class="hueco"   x="352" y="94" width="16" height="16"/>
  <rect class="mosaico" x="368" y="94" width="16" height="16"/>
  <rect class="hueco"   x="384" y="94" width="16" height="16"/>
  <rect class="mosaico" x="400" y="94" width="16" height="16"/>

  <!-- Puntos suspensivos para indicar continuación -->
  <g fill="currentColor">
    <circle cx="430" cy="102" r="2"/>
    <circle cx="440" cy="102" r="2"/>
    <circle cx="450" cy="102" r="2"/>
  </g>

  <!-- Leyenda: muestra qué es mosaico y qué es hueco. Útil sobre todo en dark. -->
  <rect class="mosaico" x="160" y="126" width="12" height="12"/>
  <text x="178" y="136" font-size="12">mosaico</text>
  <rect class="hueco"   x="240" y="126" width="12" height="12"/>
  <text x="258" y="136" font-size="12">hueco</text>
</svg>
