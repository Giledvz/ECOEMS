<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 200" width="440" height="200" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="440" height="200" fill="#ffffff"/>
  <!-- Tres triángulos rectángulos en escala. Escala uniforme: 1 unidad = 8 px. -->
  <!-- Cada triángulo con cateto vertical (a), cateto horizontal (b), hipotenusa.
       Posición base y=160 (línea de tierra). -->

  <!-- Triángulo 1: 3-4-5  -> alto 24, base 32 -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="40,160 40,136 72,160"/>
  </g>
  <polyline points="40,148 48,148 48,160" stroke="#1a1a1a" stroke-width="1.4" fill="none"/>
  <text x="30" y="152" font-size="12" text-anchor="end">3</text>
  <text x="56" y="174" font-size="12" text-anchor="middle">4</text>
  <text x="59" y="142" font-size="12" font-style="italic">5</text>

  <!-- Triángulo 2: 6-8-10 -> alto 48, base 64 -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="130,160 130,112 194,160"/>
  </g>
  <polyline points="130,148 142,148 142,160" stroke="#1a1a1a" stroke-width="1.4" fill="none"/>
  <text x="120" y="139" font-size="12" text-anchor="end">6</text>
  <text x="162" y="174" font-size="12" text-anchor="middle">8</text>
  <text x="166" y="130" font-size="12" font-style="italic">10</text>

  <!-- Triángulo 3: 8-15-17 -> alto 64, base 120 -->
  <g stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="260,160 260,96 380,160"/>
  </g>
  <polyline points="260,148 272,148 272,160" stroke="#1a1a1a" stroke-width="1.4" fill="none"/>
  <text x="250" y="130" font-size="12" text-anchor="end">8</text>
  <text x="320" y="174" font-size="12" text-anchor="middle">15</text>
  <text x="324" y="120" font-size="12" font-style="italic">17</text>
</svg>
