<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 110" width="170" height="110" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Opción B: papel desdoblado con 2 círculos pequeños, apilados verticalmente, centrados.
     Rectángulo 130×70 (mismo ratio que la pregunta).
     2 círculos radio 10, centrados horizontalmente en x=85, tocándose en el medio (y=55). -->

  <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Rectángulo 130×70 en (20,20) a (150,90). -->
    <rect x="20" y="20" width="130" height="70"/>

    <!-- 2 círculos pequeños apilados, separados por 6 px entre bordes. Centro del rect en y=55. -->
    <circle cx="85" cy="42" r="10"/>
    <circle cx="85" cy="68" r="10"/>
  </g>
</svg>
