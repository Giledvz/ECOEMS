<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 110" width="170" height="110" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Opción A: papel desdoblado con 4 semicírculos (arcos) en medio del rectángulo, en fila.
     Rectángulo 130×70 (misma proporción ≈ 1.86:1 que el rectángulo imaginario de la pregunta).
     Cada semicírculo: línea recta arriba a y=50 y curva abajo (∪), radio 10. -->

  <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Rectángulo 130×70 en (20,20) a (150,90). -->
    <rect x="20" y="20" width="130" height="70"/>

    <!-- 4 semicírculos centrados horizontalmente, radio 10, flat arriba a y=50. Curva hacia abajo. -->
    <path d="M 30,50  A 10,10 0 0 0 50,50  Z"/>
    <path d="M 60,50  A 10,10 0 0 0 80,50  Z"/>
    <path d="M 90,50  A 10,10 0 0 0 110,50 Z"/>
    <path d="M 120,50 A 10,10 0 0 0 140,50 Z"/>
  </g>
</svg>
