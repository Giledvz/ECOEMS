<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 200" width="480" height="200" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif" fill="currentColor">
  <!-- 3 círculos. Cada uno: top half + 2 cuartos abajo (línea diametral + línea vertical desde el centro hacia el rim inferior). -->

  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <!-- Círculo 1 -->
    <circle cx="70" cy="100" r="50"/>
    <line x1="20" y1="100" x2="120" y2="100"/>
    <line x1="70" y1="100" x2="70" y2="150"/>

    <!-- Círculo 2 -->
    <circle cx="240" cy="100" r="50"/>
    <line x1="190" y1="100" x2="290" y2="100"/>
    <line x1="240" y1="100" x2="240" y2="150"/>

    <!-- Círculo 3 -->
    <circle cx="410" cy="100" r="50"/>
    <line x1="360" y1="100" x2="460" y2="100"/>
    <line x1="410" y1="100" x2="410" y2="150"/>
  </g>

  <!-- Números círculo 1: 5 arriba, 7 cuarto izq, 2 cuarto der -->
  <text x="70" y="82" font-size="16" text-anchor="middle">5</text>
  <text x="50" y="124" font-size="16" text-anchor="middle">7</text>
  <text x="90" y="124" font-size="16" text-anchor="middle">2</text>

  <!-- Números círculo 2: 6 arriba, 9 cuarto izq, 3 cuarto der -->
  <text x="240" y="82" font-size="16" text-anchor="middle">6</text>
  <text x="220" y="124" font-size="16" text-anchor="middle">9</text>
  <text x="260" y="124" font-size="16" text-anchor="middle">3</text>

  <!-- Números círculo 3: 8 arriba, ? cuarto izq, 4 cuarto der -->
  <text x="410" y="82" font-size="16" text-anchor="middle">8</text>
  <text x="390" y="124" font-size="16" text-anchor="middle">?</text>
  <text x="430" y="124" font-size="16" text-anchor="middle">4</text>
</svg>
