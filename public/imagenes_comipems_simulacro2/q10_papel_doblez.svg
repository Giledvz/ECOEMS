<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="-20 0 400 130" width="400" height="130" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Dos figuras lado a lado:
     FIGURA 1 (izquierda): papel doblado en cuartos sin corte.
     FIGURA 2 (derecha): mismo papel + medio círculo cortado en el borde superior (top edge).
     Offset horizontal de la figura 2 = +200 px respecto a la figura 1. -->

  <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round">

    <!-- ═══════ FIGURA 1 — sin corte ═══════ -->
    <!-- Bottom: (30,100) → (160,100) -->
    <line x1="30" y1="100" x2="160" y2="100"/>
    <!-- Right: (160,30) → (160,100) -->
    <line x1="160" y1="30" x2="160" y2="100"/>
    <!-- Top: (30,30) → (160,30) -->
    <line x1="30" y1="30" x2="160" y2="30"/>
    <!-- Lado izquierdo desde y=63.53 hasta (30,100) -->
    <line x1="30" y1="63.53" x2="30" y2="100"/>
    <!-- Unión endpoint línea 3 con punto (20, 63.53) -->
    <line x1="130.78" y1="71.73" x2="20" y2="63.53"/>
    <!-- Línea 7° desde (30,100) → (132.5, 87.42) -->
    <line x1="30" y1="100" x2="132.5" y2="87.42"/>
    <!-- Conexión (132.5, 87.42) → (160, 30) -->
    <line x1="132.5" y1="87.42" x2="160" y2="30"/>
    <!-- Línea 3: (160, 30) → (130.78, 71.73) -->
    <line x1="160" y1="30" x2="130.78" y2="71.73"/>
    <!-- Línea 4: (160, 30) → (128.73, 63.53) -->
    <line x1="160" y1="30" x2="128.73" y2="63.53"/>
    <!-- Línea 5: (30, 30) → (-1.27, 63.53) -->
    <line x1="30" y1="30" x2="-1.27" y2="63.53"/>
    <!-- Unión horizontal: (-1.27, 63.53) → (128.73, 63.53) -->
    <line x1="-1.27" y1="63.53" x2="128.73" y2="63.53"/>

    <!-- ═══════ FIGURA 2 — con medio círculo cortado en el top (offset x +200) ═══════ -->
    <!-- Bottom: (230,100) → (360,100) -->
    <line x1="230" y1="100" x2="360" y2="100"/>
    <!-- Right: (360,30) → (360,100) -->
    <line x1="360" y1="30" x2="360" y2="100"/>
    <!-- Top con medio círculo cortado: tramo, arc hacia abajo, tramo.
         Centro del semicírculo en (275, 30), radio 14 → endpoints (261, 30) y (289, 30).
         sweep-flag=0 → arco curvándose hacia abajo (mayor y en SVG). -->
    <path d="M 230,30 L 261,30 A 14,14 0 0 0 289,30 L 360,30"/>
    <!-- Lado izquierdo desde y=63.53 hasta (230,100) -->
    <line x1="230" y1="63.53" x2="230" y2="100"/>
    <!-- Unión endpoint línea 3 con punto (220, 63.53) -->
    <line x1="330.78" y1="71.73" x2="220" y2="63.53"/>
    <!-- Línea 7° desde (230,100) → (332.5, 87.42) -->
    <line x1="230" y1="100" x2="332.5" y2="87.42"/>
    <!-- Conexión (332.5, 87.42) → (360, 30) -->
    <line x1="332.5" y1="87.42" x2="360" y2="30"/>
    <!-- Línea 3: (360, 30) → (330.78, 71.73) -->
    <line x1="360" y1="30" x2="330.78" y2="71.73"/>
    <!-- Línea 4: (360, 30) → (328.73, 63.53) -->
    <line x1="360" y1="30" x2="328.73" y2="63.53"/>
    <!-- Línea 5: (230, 30) → (198.73, 63.53) -->
    <line x1="230" y1="30" x2="198.73" y2="63.53"/>
    <!-- Unión horizontal: (198.73, 63.53) → (328.73, 63.53) -->
    <line x1="198.73" y1="63.53" x2="328.73" y2="63.53"/>

  </g>
</svg>
