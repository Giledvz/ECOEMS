<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 -25 180 165" width="180" height="165" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <g id="cube">
      <polygon points="0,-20 17.32,-30 0,-40 -17.32,-30" fill="#efe7d8" stroke="#1f1a16" stroke-width="1.5"/>
      <polygon points="0,0 -17.32,-10 -17.32,-30 0,-20" fill="#c9bda3" stroke="#1f1a16" stroke-width="1.5"/>
      <polygon points="0,0 17.32,-10 17.32,-30 0,-20" fill="#a89880" stroke="#1f1a16" stroke-width="1.5"/>
    </g>
  </defs>
  <!-- Z=1 -->
  <use href="#cube" transform="translate(90, 70)"/>     <!-- (3,3,1) -->
  <use href="#cube" transform="translate(72.68, 80)"/>  <!-- (2,3,1) -->
  <use href="#cube" transform="translate(107.32, 80)"/> <!-- (3,2,1) -->
  <use href="#cube" transform="translate(55.36, 90)"/>  <!-- (1,3,1) -->
  <use href="#cube" transform="translate(124.64, 90)"/> <!-- (3,1,1) -->
  <!-- Z=2 -->
  <use href="#cube" transform="translate(90, 50)"/>     <!-- (3,3,2) -->
  <use href="#cube" transform="translate(72.68, 60)"/>  <!-- (2,3,2) -->
  <use href="#cube" transform="translate(107.32, 60)"/> <!-- (3,2,2) -->
  <use href="#cube" transform="translate(55.36, 70)"/>  <!-- (1,3,2) -->
  <use href="#cube" transform="translate(124.64, 70)"/> <!-- (3,1,2) -->
  <use href="#cube" transform="translate(107.32, 80)"/> <!-- (2,1,2) -->
  <!-- Z=3 -->
  <use href="#cube" transform="translate(90, 30)"/>     <!-- (3,3,3) -->
  <use href="#cube" transform="translate(72.68, 40)"/>  <!-- (2,3,3) -->
  <use href="#cube" transform="translate(55.36, 50)"/>  <!-- (1,3,3) -->

  <!-- Rampa -->
  <polygon points="124.64,50 141.96,40 107.32,0 90,10" fill="#efe7d8" stroke="#1f1a16" stroke-width="1.5"/>
  <polygon points="124.64,50 90,30 90,10" fill="#c9bda3" stroke="#1f1a16" stroke-width="1.5"/>

  <!-- Líneas eliminadas: cubrir aristas internas con líneas del color exacto del polígono.
       Sin stroke-linecap (default butt) y stroke-width=3 para máxima cobertura. -->
  <!-- Techo (color #efe7d8) -->
  <line x1="90" y1="10" x2="72.68" y2="0" stroke="#efe7d8" stroke-width="3"/>
  <line x1="72.68" y1="20" x2="55.36" y2="10" stroke="#efe7d8" stroke-width="3"/>
  <!-- Verticales X=1 en pared Y=3 (color #a89880) -->
  <line x1="72.68" y1="80" x2="72.68" y2="60" stroke="#a89880" stroke-width="3"/>
  <line x1="72.68" y1="60" x2="72.68" y2="40" stroke="#a89880" stroke-width="3"/>
  <line x1="72.68" y1="40" x2="72.68" y2="20" stroke="#a89880" stroke-width="3"/>
  <!-- Horizontales Z=1..2 en pared Y=3 -->
  <line x1="55.36" y1="70" x2="72.68" y2="60" stroke="#a89880" stroke-width="3"/>
  <line x1="72.68" y1="60" x2="90" y2="50" stroke="#a89880" stroke-width="3"/>
  <line x1="38.04" y1="60" x2="55.36" y2="70" stroke="#c9bda3" stroke-width="3"/>
  <!-- Horizontales Z=2..3 en pared Y=3 -->
  <line x1="55.36" y1="50" x2="72.68" y2="40" stroke="#a89880" stroke-width="3"/>
  <line x1="72.68" y1="40" x2="90" y2="30" stroke="#a89880" stroke-width="3"/>
  <line x1="38.04" y1="40" x2="55.36" y2="50" stroke="#c9bda3" stroke-width="3"/>
  <!-- Aristas en la zona del prisma -->
  <line x1="124.64" y1="70" x2="141.96" y2="60" stroke="#a89880" stroke-width="3"/>
  <line x1="124.64" y1="70" x2="124.64" y2="50" stroke="#a89880" stroke-width="3"/>
  <line x1="107.32" y1="40" x2="90" y2="30" stroke="#c9bda3" stroke-width="3"/>
  <!-- Cubrir la diagonal vertical en svgX=107.32 (atravesando top del (2,1,2)) -->
  <line x1="107.32" y1="60" x2="107.32" y2="40" stroke="#efe7d8" stroke-width="3"/>

  <!-- ARISTAS EXTERNAS dibujadas encima para que se vean continuas -->
  <g stroke="#1f1a16" stroke-width="1.5" fill="none">
    <!-- Techo Z=3 (perímetro) -->
    <line x1="38.04" y1="20"  x2="55.36" y2="30"/>
    <line x1="55.36" y1="30"  x2="90"    y2="10"/>
    <line x1="90"    y1="10"  x2="107.32" y2="0"/>
    <line x1="107.32" y1="0"  x2="90"    y2="-10"/>
    <line x1="90"    y1="-10" x2="38.04" y2="20"/>
    <!-- Rampa -->
    <line x1="124.64" y1="50" x2="141.96" y2="40"/>
    <line x1="141.96" y1="40" x2="107.32" y2="0"/>
    <line x1="90"    y1="10"  x2="124.64" y2="50"/>
    <!-- Cara X=2 del prisma -->
    <line x1="124.64" y1="50" x2="107.32" y2="40"/>
    <line x1="90"    y1="30"  x2="90"    y2="10"/>
    <!-- Cara X=0 (contorno izquierdo del cuerpo) -->
    <line x1="38.04" y1="20"  x2="38.04" y2="80"/>
    <line x1="38.04" y1="80"  x2="55.36" y2="90"/>
    <line x1="55.36" y1="30"  x2="55.36" y2="90"/>
    <!-- Aristas inferiores del cuerpo -->
    <line x1="55.36" y1="90"  x2="72.68" y2="80"/>
    <line x1="72.68" y1="80"  x2="90"    y2="70"/>
    <line x1="90"    y1="70"  x2="107.32" y2="80"/>
    <line x1="107.32" y1="80" x2="124.64" y2="90"/>
    <line x1="124.64" y1="90" x2="141.96" y2="80"/>
    <!-- Cara Y=0 (L frontal-derecha) -->
    <line x1="141.96" y1="80" x2="141.96" y2="40"/>
    <line x1="141.96" y1="40" x2="124.64" y2="50"/>
    <line x1="107.32" y1="60" x2="107.32" y2="80"/>
    <line x1="107.32" y1="80" x2="124.64" y2="70"/>
    <line x1="124.64" y1="70" x2="124.64" y2="90"/>
    <!-- Aristas verticales internas que se quedan -->
    <line x1="107.32" y1="80" x2="107.32" y2="60"/>
    <line x1="90"    y1="70"  x2="90"    y2="50"/>
    <line x1="90"    y1="50"  x2="90"    y2="30"/>
    <!-- Arista horizontal interna del escalón -->
    <line x1="90"    y1="50"  x2="107.32" y2="40"/>
    <!-- Aristas del top del cubo (2,1,2) (re-dibujadas porque la cobertura las afectó) -->
    <line x1="107.32" y1="60" x2="124.64" y2="50"/>
    <line x1="107.32" y1="40" x2="90"    y2="50"/>
    <line x1="90"    y1="50" x2="107.32" y2="60"/>
  </g>
</svg>
