<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 220" width="360" height="220" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Tabla periódica simplificada (representación icónica) -->
  <!-- Celdas con color morado claro (#b88fd9), trazos suaves. Tamaño de celda 14×14 -->
  <g fill="#b88fd9" stroke="#7a4f9c" stroke-width="0.8">
    <!-- Fila 1: H (col 1), He (col 18) -->
    <rect x="30" y="30" width="14" height="14"/>
    <rect x="268" y="30" width="14" height="14"/>
    <!-- Fila 2: Li-Ne -->
    <rect x="30" y="44" width="14" height="14"/><rect x="44" y="44" width="14" height="14"/>
    <rect x="198" y="44" width="14" height="14"/><rect x="212" y="44" width="14" height="14"/>
    <rect x="226" y="44" width="14" height="14"/><rect x="240" y="44" width="14" height="14"/>
    <rect x="254" y="44" width="14" height="14"/><rect x="268" y="44" width="14" height="14"/>
    <!-- Fila 3: Na-Ar -->
    <rect x="30" y="58" width="14" height="14"/><rect x="44" y="58" width="14" height="14"/>
    <rect x="198" y="58" width="14" height="14"/><rect x="212" y="58" width="14" height="14"/>
    <rect x="226" y="58" width="14" height="14"/><rect x="240" y="58" width="14" height="14"/>
    <rect x="254" y="58" width="14" height="14"/><rect x="268" y="58" width="14" height="14"/>
    <!-- Fila 4: K-Kr (18 elementos) -->
    <rect x="30" y="72" width="14" height="14"/><rect x="44" y="72" width="14" height="14"/>
    <rect x="58" y="72" width="14" height="14"/><rect x="72" y="72" width="14" height="14"/>
    <rect x="86" y="72" width="14" height="14"/><rect x="100" y="72" width="14" height="14"/>
    <rect x="114" y="72" width="14" height="14"/><rect x="128" y="72" width="14" height="14"/>
    <rect x="142" y="72" width="14" height="14"/><rect x="156" y="72" width="14" height="14"/>
    <rect x="170" y="72" width="14" height="14"/><rect x="184" y="72" width="14" height="14"/>
    <rect x="198" y="72" width="14" height="14"/><rect x="212" y="72" width="14" height="14"/>
    <rect x="226" y="72" width="14" height="14"/><rect x="240" y="72" width="14" height="14"/>
    <rect x="254" y="72" width="14" height="14"/><rect x="268" y="72" width="14" height="14"/>
    <!-- Fila 5 -->
    <rect x="30" y="86" width="14" height="14"/><rect x="44" y="86" width="14" height="14"/>
    <rect x="58" y="86" width="14" height="14"/><rect x="72" y="86" width="14" height="14"/>
    <rect x="86" y="86" width="14" height="14"/><rect x="100" y="86" width="14" height="14"/>
    <rect x="114" y="86" width="14" height="14"/><rect x="128" y="86" width="14" height="14"/>
    <rect x="142" y="86" width="14" height="14"/><rect x="156" y="86" width="14" height="14"/>
    <rect x="170" y="86" width="14" height="14"/><rect x="184" y="86" width="14" height="14"/>
    <rect x="198" y="86" width="14" height="14"/><rect x="212" y="86" width="14" height="14"/>
    <rect x="226" y="86" width="14" height="14"/><rect x="240" y="86" width="14" height="14"/>
    <rect x="254" y="86" width="14" height="14"/><rect x="268" y="86" width="14" height="14"/>
    <!-- Fila 6 -->
    <rect x="30" y="100" width="14" height="14"/><rect x="44" y="100" width="14" height="14"/>
    <rect x="58" y="100" width="14" height="14"/><rect x="72" y="100" width="14" height="14"/>
    <rect x="86" y="100" width="14" height="14"/><rect x="100" y="100" width="14" height="14"/>
    <rect x="114" y="100" width="14" height="14"/><rect x="128" y="100" width="14" height="14"/>
    <rect x="142" y="100" width="14" height="14"/><rect x="156" y="100" width="14" height="14"/>
    <rect x="170" y="100" width="14" height="14"/><rect x="184" y="100" width="14" height="14"/>
    <rect x="198" y="100" width="14" height="14"/><rect x="212" y="100" width="14" height="14"/>
    <rect x="226" y="100" width="14" height="14"/><rect x="240" y="100" width="14" height="14"/>
    <rect x="254" y="100" width="14" height="14"/><rect x="268" y="100" width="14" height="14"/>
    <!-- Fila 7 (parcial) -->
    <rect x="30" y="114" width="14" height="14"/><rect x="44" y="114" width="14" height="14"/>
    <rect x="58" y="114" width="14" height="14"/><rect x="72" y="114" width="14" height="14"/>
    <rect x="86" y="114" width="14" height="14"/><rect x="100" y="114" width="14" height="14"/>
    <rect x="114" y="114" width="14" height="14"/><rect x="128" y="114" width="14" height="14"/>
    <rect x="142" y="114" width="14" height="14"/><rect x="156" y="114" width="14" height="14"/>
    <rect x="170" y="114" width="14" height="14"/>
    <!-- Lantánidos y actínidos (filas inferiores) -->
    <rect x="72" y="142" width="14" height="14"/><rect x="86" y="142" width="14" height="14"/>
    <rect x="100" y="142" width="14" height="14"/><rect x="114" y="142" width="14" height="14"/>
    <rect x="128" y="142" width="14" height="14"/><rect x="142" y="142" width="14" height="14"/>
    <rect x="156" y="142" width="14" height="14"/><rect x="170" y="142" width="14" height="14"/>
    <rect x="184" y="142" width="14" height="14"/><rect x="198" y="142" width="14" height="14"/>
    <rect x="212" y="142" width="14" height="14"/><rect x="226" y="142" width="14" height="14"/>
    <rect x="240" y="142" width="14" height="14"/><rect x="254" y="142" width="14" height="14"/>
    <rect x="72" y="156" width="14" height="14"/><rect x="86" y="156" width="14" height="14"/>
    <rect x="100" y="156" width="14" height="14"/><rect x="114" y="156" width="14" height="14"/>
    <rect x="128" y="156" width="14" height="14"/><rect x="142" y="156" width="14" height="14"/>
    <rect x="156" y="156" width="14" height="14"/><rect x="170" y="156" width="14" height="14"/>
    <rect x="184" y="156" width="14" height="14"/><rect x="198" y="156" width="14" height="14"/>
    <rect x="212" y="156" width="14" height="14"/><rect x="226" y="156" width="14" height="14"/>
    <rect x="240" y="156" width="14" height="14"/><rect x="254" y="156" width="14" height="14"/>
  </g>
  <!-- Indicador del lantánido/actínido (línea desde la celda en fila 6/7 col 3 hacia la fila inferior) -->
  <g stroke="#7a4f9c" stroke-width="0.8" fill="none">
    <line x1="58" y1="114" x2="72" y2="142"/>
    <line x1="58" y1="128" x2="72" y2="156"/>
  </g>
  <!-- Flecha horizontal de DERECHA a IZQUIERDA (arriba de la tabla) -->
  <g stroke="currentColor" stroke-width="1.8" fill="currentColor">
    <line x1="290" y1="18" x2="30" y2="18" stroke-linecap="round"/>
    <polygon points="30,18 38,14 38,22"/>
  </g>
  <!-- Flecha vertical de ARRIBA hacia ABAJO (a la izquierda de la tabla) -->
  <g stroke="currentColor" stroke-width="1.8" fill="currentColor">
    <line x1="18" y1="20" x2="18" y2="178" stroke-linecap="round"/>
    <polygon points="18,178 14,170 22,170"/>
  </g>
</svg>
