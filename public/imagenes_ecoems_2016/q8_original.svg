<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 80" width="260" height="80" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <g id="hex_base">
      <polygon points="0,-28 24.25,-14 24.25,14 0,28 -24.25,14 -24.25,-14"
               fill="#cfcfcf"/>
      <line x1="0" y1="0" x2="0" y2="-22" stroke="currentColor" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="19.05" y2="11" stroke="currentColor" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="-19.05" y2="11" stroke="currentColor" stroke-width="1.2"/>
    </g>
  </defs>

  <!-- Elemento 1: triángulos (N blanco, SE negro, SW blanco) + círculo blanco en NW -->
  <g transform="translate(43, 40)">
    <use href="#hex_base"/>
    <polygon points="0,-26 -7.5,-13 7.5,-13" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="22.52,13 7.52,13 15.02,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="-22.52,13 -7.52,13 -15.02,0" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="-15.59" cy="-9" r="6.5" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <!-- Elemento 2: triángulos (N blanco, SE negro, SW negro) + círculo negro en S -->
  <g transform="translate(130, 40)">
    <use href="#hex_base"/>
    <polygon points="0,-26 -7.5,-13 7.5,-13" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="22.52,13 7.52,13 15.02,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="-22.52,13 -7.52,13 -15.02,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="0" cy="18" r="6.5" fill="currentColor"/>
  </g>

  <!-- Elemento 3: triángulos (N blanco, SE blanco, SW negro) + círculo blanco en NE -->
  <g transform="translate(217, 40)">
    <use href="#hex_base"/>
    <polygon points="0,-26 -7.5,-13 7.5,-13" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="22.52,13 7.52,13 15.02,0" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
    <polygon points="-22.52,13 -7.52,13 -15.02,0" fill="currentColor" stroke="currentColor" stroke-width="1.5"/>
    <circle cx="15.59" cy="-9" r="6.5" fill="#ffffff" stroke="currentColor" stroke-width="1.5"/>
  </g>
</svg>
