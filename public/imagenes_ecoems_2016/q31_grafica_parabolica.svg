<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" width="320" height="240" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Ejes: origen en (50, 200), eje x hasta (290, 200), eje y hasta (50, 20) -->
  <!-- Cuadrícula -->
  <g stroke="#dddddd" stroke-width="0.8" fill="none">
    <!-- líneas verticales cada 20px -->
    <line x1="70" y1="20" x2="70" y2="200"/>
    <line x1="90" y1="20" x2="90" y2="200"/>
    <line x1="110" y1="20" x2="110" y2="200"/>
    <line x1="130" y1="20" x2="130" y2="200"/>
    <line x1="150" y1="20" x2="150" y2="200"/>
    <line x1="170" y1="20" x2="170" y2="200"/>
    <line x1="190" y1="20" x2="190" y2="200"/>
    <line x1="210" y1="20" x2="210" y2="200"/>
    <line x1="230" y1="20" x2="230" y2="200"/>
    <line x1="250" y1="20" x2="250" y2="200"/>
    <line x1="270" y1="20" x2="270" y2="200"/>
    <!-- líneas horizontales cada 20px -->
    <line x1="50" y1="40" x2="290" y2="40"/>
    <line x1="50" y1="60" x2="290" y2="60"/>
    <line x1="50" y1="80" x2="290" y2="80"/>
    <line x1="50" y1="100" x2="290" y2="100"/>
    <line x1="50" y1="120" x2="290" y2="120"/>
    <line x1="50" y1="140" x2="290" y2="140"/>
    <line x1="50" y1="160" x2="290" y2="160"/>
    <line x1="50" y1="180" x2="290" y2="180"/>
  </g>
  <!-- Ejes -->
  <g stroke="currentColor" stroke-width="1.6" fill="none">
    <line x1="50" y1="200" x2="290" y2="200" stroke-linecap="round"/>
    <line x1="50" y1="200" x2="50" y2="20" stroke-linecap="round"/>
    <!-- Puntas de flecha -->
    <polygon points="290,200 282,196 282,204" fill="currentColor"/>
    <polygon points="50,20 46,28 54,28" fill="currentColor"/>
  </g>
  <!-- Parábola exacta d = 5t². Bézier cuadrática: punto de control en la intersección
       de las tangentes en los extremos (origen y (10, 500)). Tangente inicial horizontal,
       tangente final pendiente 100; se cruzan en (5, 0) matemáticas → (150, 200) SVG. -->
  <path d="M 50,200 Q 150,200 250,20" stroke="currentColor" stroke-width="2.2" fill="none"/>
  <!-- Etiquetas de ejes -->
  <text x="170" y="222" font-size="13" font-style="italic" text-anchor="middle">Tiempo</text>
  <text x="35" y="110" font-size="13" font-style="italic" text-anchor="middle" transform="rotate(-90, 35, 110)">Desplazamiento</text>
</svg>
