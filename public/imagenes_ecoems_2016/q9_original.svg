<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 140" width="180" height="140" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="180" height="140" fill="#ffffff"/>
  <defs>
    <!-- Cubo isométrico s=20, colores estilo V.B. Origen: vértice frontal inferior.
         Convención (X,Y,Z) 1-indexed: (1,1,1) = origen del SVG en (90,110). -->
    <g id="cube">
      <polygon points="0,-20 17.32,-30 0,-40 -17.32,-30" fill="#e2e8f0" stroke="#1a1a1a" stroke-width="1.5"/>
      <polygon points="0,0 -17.32,-10 -17.32,-30 0,-20" fill="#cbd5e1" stroke="#1a1a1a" stroke-width="1.5"/>
      <polygon points="0,0 17.32,-10 17.32,-30 0,-20" fill="#94a3b8" stroke="#1a1a1a" stroke-width="1.5"/>
    </g>
  </defs>
  <!-- Figura original: 311, 321, 221, 121, 231, 241, 242 -->
  <use href="#cube" transform="translate(55.36, 70)"/>  <!-- (2,4,1) -->
  <use href="#cube" transform="translate(55.36, 50)"/>  <!-- (2,4,2) -->
  <use href="#cube" transform="translate(72.68, 80)"/>  <!-- (2,3,1) -->
  <use href="#cube" transform="translate(107.32, 80)"/> <!-- (3,2,1) -->
  <use href="#cube" transform="translate(90, 90)"/>     <!-- (2,2,1) -->
  <use href="#cube" transform="translate(124.64, 90)"/> <!-- (3,1,1) -->
  <use href="#cube" transform="translate(72.68, 100)"/> <!-- (1,2,1) -->
</svg>
