<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="720" height="560" fill="#ffffff"/>

  <defs>
    <!-- Reloj base: círculo con 12 marcas y números cardinales -->
    <symbol id="clockface" overflow="visible">
      <circle cx="0" cy="0" r="55" fill="#ffffff" stroke="#1a1a1a" stroke-width="2"/>
      <text x="0" y="-38" text-anchor="middle" font-size="11">12</text>
      <text x="38" y="4" text-anchor="middle" font-size="11">3</text>
      <text x="0" y="46" text-anchor="middle" font-size="11">6</text>
      <text x="-38" y="4" text-anchor="middle" font-size="11">9</text>
      <text x="20" y="-30" text-anchor="middle" font-size="9">1</text>
      <text x="32" y="-18" text-anchor="middle" font-size="9">2</text>
      <text x="34" y="22" text-anchor="middle" font-size="9">4</text>
      <text x="22" y="34" text-anchor="middle" font-size="9">5</text>
      <text x="-22" y="34" text-anchor="middle" font-size="9">7</text>
      <text x="-34" y="22" text-anchor="middle" font-size="9">8</text>
      <text x="-34" y="-18" text-anchor="middle" font-size="9">10</text>
      <text x="-20" y="-30" text-anchor="middle" font-size="9">11</text>
      <circle cx="0" cy="0" r="3" fill="#1a1a1a"/>
    </symbol>
  </defs>

  <!-- Serie -->
  <!-- Reloj 1: 9:00 (horaria al 9, minutera al 3) -->
  <g transform="translate(95, 95)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="-30" y2="0" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="40" y2="0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Reloj 2: ~7:24 (horaria al 7, minutera entre 4 y 5) -->
  <g transform="translate(245, 95)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="-22" y2="22" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="20" y2="35" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Reloj 3: ~5:30 (horaria entre 5 y 6, minutera al 6) -->
  <g transform="translate(395, 95)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="10" y2="28" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Reloj 4: 3:45 (horaria al 3, minutera al 9) -->
  <g transform="translate(545, 95)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="30" y2="0" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-40" y2="0" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Cuadrito interrogación a la derecha -->
  <g transform="translate(640, 95)" opacity="0.0">
    <use href="#clockface"/>
  </g>

  <!-- Opciones a, b, c, d -->
  <g font-size="16" font-weight="600">
    <text x="60" y="280">a)</text>
    <text x="380" y="280">b)</text>
    <text x="60" y="450">c)</text>
    <text x="380" y="450">d)</text>
  </g>

  <!-- Opción a: 12:30 (horaria entre 12 y 1, minutera al 6) -->
  <g transform="translate(150, 320)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="5" y2="-28" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Opción b: 1:18 (horaria al 1, minutera entre 3 y 4) -->
  <g transform="translate(470, 320)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="14" y2="-22" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="35" y2="22" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Opción c: 12:35 (horaria entre 12 y 1, minutera al 7) -->
  <g transform="translate(150, 490)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="6" y2="-28" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="-22" y2="34" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>

  <!-- Opción d: 1:00 (horaria al 1, minutera al 12) -->
  <g transform="translate(470, 490)">
    <use href="#clockface"/>
    <line x1="0" y1="0" x2="14" y2="-22" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="0" y2="-40" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
