<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 560" width="720" height="560" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <!-- Círculo dividido en 8 sectores con radio interior, mostrando rejilla -->
    <symbol id="circle8" overflow="visible">
      <circle cx="0" cy="0" r="55" fill="#ffffff" stroke="currentColor" stroke-width="2"/>
      <line x1="-55" y1="0" x2="55" y2="0" stroke="currentColor" stroke-width="1"/>
      <line x1="0" y1="-55" x2="0" y2="55" stroke="currentColor" stroke-width="1"/>
      <line x1="-39" y1="-39" x2="39" y2="39" stroke="currentColor" stroke-width="1"/>
      <line x1="-39" y1="39" x2="39" y2="-39" stroke="currentColor" stroke-width="1"/>
      <circle cx="0" cy="0" r="22" fill="none" stroke="currentColor" stroke-width="1"/>
    </symbol>
  </defs>

  <!-- Serie horizontal arriba (3 figuras) -->
  <!-- Patrón: el sector negro avanza un octavo en sentido horario -->

  <!-- Figura 1: sector 0° a 45° (arriba-derecha) negro -->
  <g transform="translate(150, 100)">
    <path d="M 0 0 L 0 -55 A 55 55 0 0 1 39 -39 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Figura 2: sector 45° a 90° (derecha-arriba al derecho) negro + sector 0-45 -->
  <g transform="translate(310, 100)">
    <path d="M 0 0 L 0 -55 A 55 55 0 0 1 55 0 Z" fill="currentColor"/>
    <path d="M 0 0 L 55 0 A 55 55 0 0 1 39 39 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Figura 3: 3 sectores negros (los anteriores + el de abajo-derecha) -->
  <g transform="translate(470, 100)">
    <path d="M 0 0 L 0 -55 A 55 55 0 0 1 55 0 Z" fill="currentColor"/>
    <path d="M 0 0 L 55 0 A 55 55 0 0 1 39 39 Z" fill="currentColor"/>
    <path d="M 0 0 L 39 39 A 55 55 0 0 1 0 55 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Opciones a, b, c, d -->
  <g font-size="16" font-weight="600">
    <text x="60" y="280">a)</text>
    <text x="380" y="280">b)</text>
    <text x="60" y="450">c)</text>
    <text x="380" y="450">d)</text>
  </g>

  <!-- Opción a: 4 sectores negros del lado derecho (mitad derecha negra) -->
  <g transform="translate(170, 320)">
    <path d="M 0 0 L 0 -55 A 55 55 0 1 1 0 55 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Opción b: mitad izquierda negra -->
  <g transform="translate(490, 320)">
    <path d="M 0 0 L 0 -55 A 55 55 0 1 0 0 55 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Opción c: 4 sectores negros (mitad izquierda) -->
  <g transform="translate(170, 490)">
    <path d="M 0 0 L 0 -55 A 55 55 0 0 1 55 0 Z" fill="currentColor"/>
    <path d="M 0 0 L 55 0 A 55 55 0 0 1 39 39 Z" fill="currentColor"/>
    <path d="M 0 0 L 39 39 A 55 55 0 0 1 0 55 Z" fill="currentColor"/>
    <path d="M 0 0 L 0 55 A 55 55 0 0 1 -39 39 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>

  <!-- Opción d: sector 270 a 315 negro (cuadrante inferior izquierdo + uno extra) -->
  <g transform="translate(490, 490)">
    <path d="M 0 0 L 0 55 A 55 55 0 0 1 -39 39 Z" fill="currentColor"/>
    <use href="#circle8"/>
  </g>
</svg>
