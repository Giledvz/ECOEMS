<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="700" height="460" fill="#ffffff"/>

  <!-- Terreno rectangular dividido por valla en dos mitades iguales -->
  <!-- Borde izquierdo y derecho del rectángulo -->
  <line x1="100" y1="120" x2="100" y2="380" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="600" y1="120" x2="600" y2="380" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Borde inferior completo (ancho = 2x) -->
  <line x1="100" y1="380" x2="600" y2="380" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Borde superior con dos puertas de 3m (una por mitad) -->
  <!-- Mitad izquierda: 100 a 350 -->
  <!-- Puerta de 3m centrada: por ejemplo 200 a 250 -->
  <line x1="100" y1="120" x2="200" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="250" y1="120" x2="350" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Etiqueta puerta izquierda -->
  <text x="225" y="105" text-anchor="middle" font-size="16" font-weight="600">3 m</text>
  <line x1="200" y1="115" x2="250" y2="115" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="200" y1="110" x2="200" y2="120" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="250" y1="110" x2="250" y2="120" stroke="#c2410c" stroke-width="1.5"/>

  <!-- Mitad derecha: 350 a 600 -->
  <!-- Puerta de 3m centrada: por ejemplo 450 a 500 -->
  <line x1="350" y1="120" x2="450" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="500" y1="120" x2="600" y2="120" stroke="#1a1a1a" stroke-width="2"/>
  <!-- Etiqueta puerta derecha -->
  <text x="475" y="105" text-anchor="middle" font-size="16" font-weight="600">3 m</text>
  <line x1="450" y1="115" x2="500" y2="115" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="450" y1="110" x2="450" y2="120" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="500" y1="110" x2="500" y2="120" stroke="#c2410c" stroke-width="1.5"/>

  <!-- Valla central (vertical) -->
  <line x1="350" y1="120" x2="350" y2="380" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Etiquetas de altura "y" en las tres líneas verticales -->
  <text x="80" y="255" text-anchor="middle" font-size="22" font-weight="600" font-style="italic">y</text>
  <text x="335" y="255" text-anchor="middle" font-size="22" font-weight="600" font-style="italic">y</text>
  <text x="615" y="255" text-anchor="middle" font-size="22" font-weight="600" font-style="italic">y</text>

  <!-- Etiquetas de "x" en las dos mitades del lado inferior -->
  <text x="225" y="410" text-anchor="middle" font-size="22" font-weight="600" font-style="italic">x</text>
  <text x="475" y="410" text-anchor="middle" font-size="22" font-weight="600" font-style="italic">x</text>
</svg>
