<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 260" width="500" height="342" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Gráfica velocidad (m/s) vs tiempo (s) con 8 puntos.
     Origen en (60, 210). Escala: 15 px/s en x, 20 px/(m/s) en y.
     Puntos:
       1: (0, 0) — (60, 210)
       2: (3, 5) — (105, 110)
       3: (6, 5) — (150, 110)
       4: (9, 8) — (195, 50)
       5: (12, 8) — (240, 50)
       6: (14, 5) — (270, 110)
       7: (16, 5) — (300, 110)
       8: (18, 0) — (330, 210)
     Cuadrícula cada 2 unidades (más espaciada) para evitar que números rocen líneas. -->

  <!-- Cuadrícula cada 2 unidades -->
  <g stroke="currentColor" stroke-opacity="0.22" stroke-width="0.8" fill="none">
    <line x1="90"  y1="40" x2="90"  y2="210"/>
    <line x1="120" y1="40" x2="120" y2="210"/>
    <line x1="150" y1="40" x2="150" y2="210"/>
    <line x1="180" y1="40" x2="180" y2="210"/>
    <line x1="210" y1="40" x2="210" y2="210"/>
    <line x1="240" y1="40" x2="240" y2="210"/>
    <line x1="270" y1="40" x2="270" y2="210"/>
    <line x1="300" y1="40" x2="300" y2="210"/>
    <line x1="330" y1="40" x2="330" y2="210"/>
    <line x1="60" y1="170" x2="345" y2="170"/>
    <line x1="60" y1="130" x2="345" y2="130"/>
    <line x1="60" y1="90"  x2="345" y2="90"/>
    <line x1="60" y1="50"  x2="345" y2="50"/>
  </g>

  <!-- Ejes -->
  <g stroke="currentColor" stroke-width="1.6" fill="currentColor">
    <line x1="60" y1="210" x2="350" y2="210" stroke-linecap="round"/>
    <line x1="60" y1="40"  x2="60"  y2="220" stroke-linecap="round"/>
    <polygon points="350,210 342,206 342,214"/>
    <polygon points="60,40 56,48 64,48"/>
  </g>

  <!-- Curva v vs t -->
  <polyline points="60,210 105,110 150,110 195,50 240,50 270,110 300,110 330,210"
            stroke="currentColor" stroke-width="2" fill="none"
            stroke-linejoin="round" stroke-linecap="round"/>

  <!-- Marcadores en cada punto -->
  <g fill="currentColor">
    <circle cx="60"  cy="210" r="3"/>
    <circle cx="105" cy="110" r="3"/>
    <circle cx="150" cy="110" r="3"/>
    <circle cx="195" cy="50"  r="3"/>
    <circle cx="240" cy="50"  r="3"/>
    <circle cx="270" cy="110" r="3"/>
    <circle cx="300" cy="110" r="3"/>
    <circle cx="330" cy="210" r="3"/>
  </g>

  <!-- Números de los puntos (posiciones ajustadas para evitar líneas de cuadrícula) -->
  <g font-family="'IBM Plex Sans', sans-serif" font-size="13"
     style="font-variant-numeric: tabular-nums;" text-anchor="middle">
    <text x="51"  y="225">1</text>
    <text x="105" y="100">2</text>
    <text x="150" y="100">3</text>
    <text x="195" y="38">4</text>
    <text x="240" y="38">5</text>
    <text x="270" y="100">6</text>
    <text x="300" y="100">7</text>
    <text x="340" y="225">8</text>
  </g>

  <!-- Etiqueta eje X: t (s) al lado de la flecha -->
  <text x="354" y="215" font-size="14">
    <tspan font-style="italic">t</tspan>
    <tspan font-size="11"> (s)</tspan>
  </text>

  <!-- Etiqueta eje Y: v (m/s) ENCIMA de la flecha del eje Y -->
  <text x="60" y="30" font-size="14" text-anchor="middle">
    <tspan font-style="italic">v</tspan>
    <tspan font-size="11"> (m/s)</tspan>
  </text>
</svg>
