<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 350" width="540" height="411" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Frente de casa: cuerpo + techo triángulo rectángulo asimétrico (cumbre arriba-DER)
     + puerta central + 2 ventanas. Sin etiquetas — base limpia para iterar.
     Escala 1u = 18 px (mismo en x e y).
     Cuerpo: 20u × 8u = 360×144 px en (50,160)–(410,304). [Alto doblado vs versión previa.]
     Techo: cumbre en (410,88), base de (50,160) a (410,160), lado vertical 4u (también doblado).
     Ventanas: 3u × 3u (cuadradas), alineadas con el top de la puerta.
     Puerta: 4u × 6u (doble ancho y alto que antes), centrada horizontalmente,
     pegada al piso. -->

  <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round">
    <!-- Cuerpo principal -->
    <rect x="50" y="160" width="360" height="144"/>
    <!-- Techo triángulo rectángulo (cumbre arriba-DERECHA, altura doblada) -->
    <polygon points="50,160 410,160 410,88"/>
    <!-- Puerta central (4u × 6u, pegada al piso) -->
    <rect x="194" y="196" width="72" height="108"/>
    <!-- Ventana izquierda (3u × 3u, centrada en el espacio entre el borde izq y la puerta) -->
    <rect x="95" y="196" width="54" height="54"/>
    <!-- Cruz interna de la ventana izquierda (cuatro cuadrantes) -->
    <line x1="95"  y1="223" x2="149" y2="223"/>
    <line x1="122" y1="196" x2="122" y2="250"/>
    <!-- Ventana derecha (3u × 3u, centrada en el espacio entre la puerta y el borde der) -->
    <rect x="311" y="196" width="54" height="54"/>
    <!-- Cruz interna de la ventana derecha -->
    <line x1="311" y1="223" x2="365" y2="223"/>
    <line x1="338" y1="196" x2="338" y2="250"/>
  </g>

  <!-- Manija de la puerta (círculo relleno, cerca del lado derecho a media altura) -->
  <circle cx="255" cy="252" r="2.5"/>

  <!-- Medidas del triángulo del techo -->
  <g font-size="14">
    <!-- Hipotenusa √404 u sobre el medio de la diagonal del techo -->
    <text x="230" y="108" text-anchor="middle">√<tspan style="text-decoration:overline">404</tspan> <tspan font-style="italic">u</tspan></text>
    <!-- Cateto vertical (lado derecho del techo) = 2u, a la derecha del lado -->
    <text x="420" y="129" text-anchor="start">2<tspan font-style="italic">u</tspan></text>
    <!-- Altura del cuerpo (lado izquierdo, fuera del rectángulo) = 4u -->
    <text x="42" y="236" text-anchor="end">4<tspan font-style="italic">u</tspan></text>
    <!-- Ancho de la puerta (arriba de la puerta, dentro del cuerpo) = 2u -->
    <text x="230" y="188" text-anchor="middle">2<tspan font-style="italic">u</tspan></text>
    <!-- Alto de la puerta (a la derecha de la puerta) = 3u -->
    <text x="272" y="254" text-anchor="start">3<tspan font-style="italic">u</tspan></text>
    <!-- Lado de la ventana derecha (a la derecha) = 2u -->
    <text x="372" y="227" text-anchor="start">2<tspan font-style="italic">u</tspan></text>
  </g>
</svg>
