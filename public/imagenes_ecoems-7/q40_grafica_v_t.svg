<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" width="400" height="240" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Gráfica velocidad (km/h) vs tiempo (h).
       Origen plot en (50, 200). 1h = 60 px en X. 20 km/h = 30 px en Y.
       Puntos: (0,0), (1,60), (2,60), (3,80), (4,80), (5,120). -->
  <!-- Gridlines verticales -->
  <g stroke="currentColor" stroke-width="0.5" opacity="0.25">
    <line x1="110" y1="200" x2="110" y2="20"/>
    <line x1="170" y1="200" x2="170" y2="20"/>
    <line x1="230" y1="200" x2="230" y2="20"/>
    <line x1="290" y1="200" x2="290" y2="20"/>
    <line x1="350" y1="200" x2="350" y2="20"/>
    <line x1="50" y1="170" x2="350" y2="170"/>
    <line x1="50" y1="140" x2="350" y2="140"/>
    <line x1="50" y1="110" x2="350" y2="110"/>
    <line x1="50" y1="80"  x2="350" y2="80"/>
    <line x1="50" y1="50"  x2="350" y2="50"/>
    <line x1="50" y1="20"  x2="350" y2="20"/>
  </g>
  <!-- Ejes con flecha -->
  <g stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round">
    <line x1="50" y1="200" x2="365" y2="200"/>
    <polygon points="365,200 359,197 359,203" fill="currentColor" stroke="none"/>
    <line x1="50" y1="200" x2="50" y2="15"/>
    <polygon points="50,15 47,21 53,21" fill="currentColor" stroke="none"/>
  </g>
  <!-- Curva v(t) -->
  <path d="M 50,200 L 110,110 L 170,110 L 230,80 L 290,80 L 350,20"
        stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round"/>
  <!-- Marcadores en los puntos de quiebre -->
  <g fill="currentColor">
    <circle cx="50" cy="200" r="2"/>
    <circle cx="110" cy="110" r="2"/>
    <circle cx="170" cy="110" r="2"/>
    <circle cx="230" cy="80" r="2"/>
    <circle cx="290" cy="80" r="2"/>
    <circle cx="350" cy="20" r="2"/>
  </g>
  <!-- Labels eje X -->
  <g font-size="11" text-anchor="middle" fill="currentColor">
    <text x="50"  y="215">0</text>
    <text x="110" y="215">1</text>
    <text x="170" y="215">2</text>
    <text x="230" y="215">3</text>
    <text x="290" y="215">4</text>
    <text x="350" y="215">5</text>
    <text x="380" y="205" font-style="italic">t (h)</text>
  </g>
  <!-- Labels eje Y -->
  <g font-size="11" text-anchor="end" fill="currentColor">
    <text x="44" y="204">0</text>
    <text x="44" y="174">20</text>
    <text x="44" y="144">40</text>
    <text x="44" y="114">60</text>
    <text x="44" y="84">80</text>
    <text x="44" y="54">100</text>
    <text x="44" y="24">120</text>
    <text x="60" y="12" font-style="italic" text-anchor="start">v (km/h)</text>
  </g>
</svg>
