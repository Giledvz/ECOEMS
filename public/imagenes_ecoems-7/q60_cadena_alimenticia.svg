<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 140" width="560" height="140" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Ciclo: Productor → Herbívoro → Omnívoro → Carnívoro → Carnívoro → Desintegrador → (loop) → Productor.
       Sol como entrada externa arriba apuntando a Productor. -->
  <g stroke="currentColor" stroke-width="1.5" fill="none">
    <!-- Sol (afuera de la cadena) -->
    <rect x="3" y="5" width="80" height="35" rx="5"/>
    <!-- Cadena -->
    <rect x="3" y="70" width="80" height="35" rx="5"/>
    <rect x="97" y="70" width="80" height="35" rx="5"/>
    <rect x="191" y="70" width="80" height="35" rx="5"/>
    <rect x="285" y="70" width="80" height="35" rx="5"/>
    <rect x="379" y="70" width="80" height="35" rx="5"/>
    <rect x="473" y="70" width="80" height="35" rx="5"/>
    <!-- Flecha Sol → Productor (vertical) -->
    <line x1="43" y1="40" x2="43" y2="66"/>
    <!-- Flechas horizontales de la cadena -->
    <line x1="84" y1="87.5" x2="91" y2="87.5"/>
    <line x1="178" y1="87.5" x2="185" y2="87.5"/>
    <line x1="272" y1="87.5" x2="279" y2="87.5"/>
    <line x1="366" y1="87.5" x2="373" y2="87.5"/>
    <line x1="460" y1="87.5" x2="467" y2="87.5"/>
    <!-- Flecha cíclica: Desintegrador → Productor por abajo -->
    <path d="M 513 105 L 513 125 L 43 125 L 43 109"/>
  </g>
  <g fill="currentColor">
    <polygon points="43,70 40,66 46,66"/>
    <polygon points="95,87.5 91,85 91,90"/>
    <polygon points="189,87.5 185,85 185,90"/>
    <polygon points="283,87.5 279,85 279,90"/>
    <polygon points="377,87.5 373,85 373,90"/>
    <polygon points="471,87.5 467,85 467,90"/>
    <polygon points="43,105 40,109 46,109"/>
  </g>
  <g font-size="11" text-anchor="middle" fill="currentColor">
    <text x="43" y="27">Sol</text>
    <text x="43" y="92">Productor</text>
    <text x="137" y="92">Herbívoro</text>
    <text x="231" y="92">Omnívoro</text>
    <text x="325" y="92">Carnívoro</text>
    <text x="419" y="92">Carnívoro</text>
    <text x="513" y="92">Desintegrador</text>
  </g>
</svg>
