<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 140 160" width="140" height="160" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <symbol id="cubeUnit" overflow="visible">
      <polygon points="0,0 20,0 20,-20 0,-20" fill="#ffffff" stroke="currentColor" stroke-width="1" stroke-linejoin="miter"/>
      <polygon points="20,0 30,-10 30,-30 20,-20" fill="#d8d8d8" stroke="currentColor" stroke-width="1" stroke-linejoin="miter"/>
      <polygon points="0,-20 20,-20 30,-30 10,-30" fill="#ffffff" stroke="currentColor" stroke-width="1" stroke-linejoin="miter"/>
    </symbol>
  </defs>

  <!-- Sólido 4: 111 + 112 + 221 + 231 + 122 + 123 + 131 -->
  <!-- Render order: back-to-front (y desc), left-to-right (x asc), bottom-to-top (z asc) -->
  <!-- (1,3,1) → (0,2,0): (55, 100) -->
  <use href="#cubeUnit" x="55" y="100"/>
  <!-- (2,3,1) → (1,2,0): (75, 100) -->
  <use href="#cubeUnit" x="75" y="100"/>
  <!-- (2,2,1) → (1,1,0): (65, 110) -->
  <use href="#cubeUnit" x="65" y="110"/>
  <!-- (1,2,2) → (0,1,1): (45, 90) -->
  <use href="#cubeUnit" x="45" y="90"/>
  <!-- (1,2,3) → (0,1,2): (45, 70) -->
  <use href="#cubeUnit" x="45" y="70"/>
  <!-- (1,1,1) → (0,0,0): (35, 120) -->
  <use href="#cubeUnit" x="35" y="120"/>
  <!-- (1,1,2) → (0,0,1): (35, 100) -->
  <use href="#cubeUnit" x="35" y="100"/>
</svg>
