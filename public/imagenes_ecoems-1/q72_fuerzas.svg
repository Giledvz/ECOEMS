<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Caja -->
  <rect x="270" y="100" width="160" height="80" fill="#f8fafc" stroke="currentColor" stroke-width="2"/>

  <!-- Punto central de aplicación -->
  <circle cx="350" cy="140" r="5" fill="currentColor"/>

  <!-- Flecha F1 = 27 N: punta tocando el borde izquierdo, cuerpo afuera de la caja -->
  <line x1="130" y1="140" x2="260" y2="140" stroke="#c2410c" stroke-width="3"/>
  <polygon points="270,140 255,133 255,147" fill="#c2410c"/>

  <!-- Etiqueta F1 -->
  <text x="200" y="125" text-anchor="middle" font-size="20" fill="#c2410c">
    <tspan font-style="italic">F</tspan><tspan font-size="14" baseline-shift="sub">1</tspan><tspan> = 27 N</tspan>
  </text>

  <!-- Flecha F2 = 42 N: punta tocando el borde derecho, cuerpo afuera de la caja -->
  <line x1="570" y1="140" x2="440" y2="140" stroke="#1d4ed8" stroke-width="3"/>
  <polygon points="430,140 445,133 445,147" fill="#1d4ed8"/>

  <!-- Etiqueta F2 -->
  <text x="500" y="125" text-anchor="middle" font-size="20" fill="#1d4ed8">
    <tspan font-style="italic">F</tspan><tspan font-size="14" baseline-shift="sub">2</tspan><tspan> = 42 N</tspan>
  </text>
</svg>
