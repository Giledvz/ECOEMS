<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 540" width="460" height="540" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Etiqueta superior: Alcalinidad -->
  <rect x="170" y="20" width="120" height="32" fill="#bfdbfe" stroke="currentColor" stroke-width="1.5"/>
  <text x="230" y="42" text-anchor="middle" font-size="18">Alcalinidad</text>

  <!-- Flecha vertical (tocando las cajas, sin entrar) -->
  <line x1="230" y1="61" x2="230" y2="489" stroke="currentColor" stroke-width="2"/>
  <polygon points="225,61 235,61 230,52" fill="currentColor"/>
  <polygon points="225,489 235,489 230,498" fill="currentColor"/>

  <!-- Marcas de la escala 0-14 (15 niveles); y rango 65→485, así cada paso = (485-65)/14 = 30 px -->
  <!-- pH 14 arriba -->
  <g font-size="14">
    <line x1="225" y1="65" x2="235" y2="65" stroke="currentColor"/><text x="218" y="69" text-anchor="end">14</text>
    <line x1="225" y1="95" x2="235" y2="95" stroke="currentColor"/><text x="218" y="99" text-anchor="end">13</text>
    <line x1="225" y1="125" x2="235" y2="125" stroke="currentColor"/><text x="218" y="129" text-anchor="end">12</text>
    <line x1="225" y1="155" x2="235" y2="155" stroke="currentColor"/><text x="218" y="159" text-anchor="end">11</text>
    <line x1="225" y1="185" x2="235" y2="185" stroke="currentColor"/><text x="218" y="189" text-anchor="end">10</text>
    <line x1="225" y1="215" x2="235" y2="215" stroke="currentColor"/><text x="218" y="219" text-anchor="end">9</text>
    <line x1="225" y1="245" x2="235" y2="245" stroke="currentColor"/><text x="218" y="249" text-anchor="end">8</text>
    <line x1="225" y1="275" x2="235" y2="275" stroke="currentColor"/><text x="218" y="279" text-anchor="end">7</text>
    <line x1="225" y1="305" x2="235" y2="305" stroke="currentColor"/><text x="218" y="309" text-anchor="end">6</text>
    <line x1="225" y1="335" x2="235" y2="335" stroke="currentColor"/><text x="218" y="339" text-anchor="end">5</text>
    <line x1="225" y1="365" x2="235" y2="365" stroke="currentColor"/><text x="218" y="369" text-anchor="end">4</text>
    <line x1="225" y1="395" x2="235" y2="395" stroke="currentColor"/><text x="218" y="399" text-anchor="end">3</text>
    <line x1="225" y1="425" x2="235" y2="425" stroke="currentColor"/><text x="218" y="429" text-anchor="end">2</text>
    <line x1="225" y1="455" x2="235" y2="455" stroke="currentColor"/><text x="218" y="459" text-anchor="end">1</text>
    <line x1="225" y1="485" x2="235" y2="485" stroke="currentColor"/><text x="218" y="489" text-anchor="end">0</text>
  </g>

  <!-- Productos a la derecha -->
  <g font-size="15">
    <text x="250" y="155" alignment-baseline="middle">Blanqueador casero</text>
    <text x="250" y="185" alignment-baseline="middle">Leche de magnesia</text>
    <text x="250" y="215" alignment-baseline="middle">Bicarbonato de sodio</text>
    <text x="250" y="275" alignment-baseline="middle">Agua</text>
    <text x="250" y="305" alignment-baseline="middle">Tinto (café negro)</text>
    <text x="250" y="335" alignment-baseline="middle">Vino blanco</text>
    <text x="250" y="365" alignment-baseline="middle">Jugo de limón</text>
  </g>

  <!-- Etiqueta "Neutro" a la izquierda en pH 7 -->
  <rect x="115" y="259" width="80" height="32" fill="#e5e7eb" stroke="currentColor" stroke-width="1.2"/>
  <text x="155" y="280" text-anchor="middle" font-size="16">Neutro</text>

  <!-- Etiqueta inferior: Acidez -->
  <rect x="170" y="498" width="120" height="32" fill="#fecaca" stroke="currentColor" stroke-width="1.5"/>
  <text x="230" y="520" text-anchor="middle" font-size="18">Acidez</text>
</svg>
