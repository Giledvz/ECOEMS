<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="axArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="700" height="500" fill="#ffffff"/>

  <!-- Cuadrícula: eje X cada 1 s (0 a 5), eje Y cada 2 m/s (0 a 10) -->
  <g stroke="#d1d5db" stroke-width="0.8">
    <!-- Verticales (cada 1 s, escala: 100 px por segundo) -->
    <line x1="180" y1="430" x2="180" y2="60"/>
    <line x1="280" y1="430" x2="280" y2="60"/>
    <line x1="380" y1="430" x2="380" y2="60"/>
    <line x1="480" y1="430" x2="480" y2="60"/>
    <line x1="580" y1="430" x2="580" y2="60"/>
    <!-- Horizontales (cada 2 m/s, escala: 74 px por 2 m/s) -->
    <line x1="80" y1="356" x2="620" y2="356"/>
    <line x1="80" y1="282" x2="620" y2="282"/>
    <line x1="80" y1="208" x2="620" y2="208"/>
    <line x1="80" y1="134" x2="620" y2="134"/>
  </g>

  <!-- Ejes -->
  <line x1="80" y1="430" x2="640" y2="430" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#axArrow)"/>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#axArrow)"/>

  <!-- Tics eje X -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="430" x2="80" y2="436"/>
    <line x1="180" y1="430" x2="180" y2="436"/>
    <line x1="280" y1="430" x2="280" y2="436"/>
    <line x1="380" y1="430" x2="380" y2="436"/>
    <line x1="480" y1="430" x2="480" y2="436"/>
    <line x1="580" y1="430" x2="580" y2="436"/>
  </g>

  <!-- Tics eje Y -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="430" x2="74" y2="430"/>
    <line x1="80" y1="356" x2="74" y2="356"/>
    <line x1="80" y1="282" x2="74" y2="282"/>
    <line x1="80" y1="208" x2="74" y2="208"/>
    <line x1="80" y1="134" x2="74" y2="134"/>
  </g>

  <!-- Números eje X -->
  <g font-size="16" text-anchor="middle" fill="#1a1a1a">
    <text x="80" y="456">0</text>
    <text x="180" y="456">1</text>
    <text x="280" y="456">2</text>
    <text x="380" y="456">3</text>
    <text x="480" y="456">4</text>
    <text x="580" y="456">5</text>
  </g>

  <!-- Números eje Y -->
  <g font-size="16" text-anchor="end" fill="#1a1a1a">
    <text x="68" y="436">0</text>
    <text x="68" y="362">2</text>
    <text x="68" y="288">4</text>
    <text x="68" y="214">6</text>
    <text x="68" y="140">8</text>
    <text x="68" y="66">10</text>
  </g>

  <!-- Tic y línea de cuadrícula para 10 (en el borde) -->
  <line x1="80" y1="60" x2="74" y2="60" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="80" y1="60" x2="620" y2="60" stroke="#d1d5db" stroke-width="0.8"/>

  <!-- Etiqueta eje X -->
  <text x="350" y="485" text-anchor="middle" font-size="18">
    <tspan>tiempo </tspan><tspan font-style="italic">t</tspan><tspan> (s)</tspan>
  </text>

  <!-- Etiqueta eje Y -->
  <text x="30" y="245" text-anchor="middle" font-size="18" transform="rotate(-90 30 245)">
    <tspan>velocidad </tspan><tspan font-style="italic">v</tspan><tspan> (m/s)</tspan>
  </text>

  <!-- Curva de datos: (0,0) a (5, 10) -->
  <line x1="80" y1="430" x2="580" y2="60" stroke="#1d4ed8" stroke-width="2.8"/>

  <!-- Puntos extremos -->
  <circle cx="80" cy="430" r="4.5" fill="#1d4ed8"/>
  <circle cx="580" cy="60" r="4.5" fill="#1d4ed8"/>
</svg>
