<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 380" width="600" height="380" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Prisma rectangular (paralelepípedo) en perspectiva isométrica -->
  <!-- Cara frontal grande (5a x 3a) -->
  <polygon points="100,100 470,100 470,250 100,250" fill="#efe7d8" stroke="#1f1a16" stroke-width="2"/>
  <!-- Cara superior (5a x a) -->
  <polygon points="100,100 145,55 515,55 470,100" fill="#c9bda3" stroke="#1f1a16" stroke-width="2"/>
  <!-- Cara lateral derecha (a x 3a) -->
  <polygon points="470,100 515,55 515,205 470,250" fill="#a89880" stroke="#1f1a16" stroke-width="2"/>

  <!-- Aristas ocultas -->
  <line x1="100" y1="250" x2="145" y2="205" stroke="#1f1a16" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="145" y1="205" x2="515" y2="205" stroke="#1f1a16" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
  <line x1="145" y1="205" x2="145" y2="55" stroke="#1f1a16" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>

  <!-- Etiqueta 3a (altura, derecha) -->
  <line x1="545" y1="55" x2="545" y2="205" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="540" y1="55" x2="550" y2="55" stroke="#1d4ed8" stroke-width="1.5"/>
  <line x1="540" y1="205" x2="550" y2="205" stroke="#1d4ed8" stroke-width="1.5"/>
  <text x="555" y="135" font-size="22" fill="#1d4ed8" font-style="italic">3a</text>

  <!-- Etiqueta 5a (largo, abajo) -->
  <line x1="100" y1="285" x2="470" y2="285" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="100" y1="280" x2="100" y2="290" stroke="#16a34a" stroke-width="1.5"/>
  <line x1="470" y1="280" x2="470" y2="290" stroke="#16a34a" stroke-width="1.5"/>
  <text x="285" y="312" text-anchor="middle" font-size="22" fill="#16a34a" font-style="italic">5a</text>

  <!-- Etiqueta a (ancho, arriba derecha) -->
  <line x1="490" y1="270" x2="535" y2="225" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="486" y1="266" x2="494" y2="274" stroke="#c2410c" stroke-width="1.5"/>
  <line x1="531" y1="221" x2="539" y2="229" stroke="#c2410c" stroke-width="1.5"/>
  <text x="525" y="265" font-size="22" fill="#c2410c" font-style="italic">a</text>
</svg>
