<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="220" height="220" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <!-- Cubo en proyección cabinet espejo (vista desde la izquierda) -->
    <symbol id="cubeUnit" overflow="visible">
      <polygon points="0,0 20,0 20,-20 0,-20" fill="#c9bda3" stroke="#1f1a16" stroke-width="1" stroke-linejoin="miter"/>
      <polygon points="0,0 -10,-10 -10,-30 0,-20" fill="#a89880" stroke="#1f1a16" stroke-width="1" stroke-linejoin="miter"/>
      <polygon points="0,-20 20,-20 10,-30 -10,-30" fill="#efe7d8" stroke="#1f1a16" stroke-width="1" stroke-linejoin="miter"/>
    </symbol>
  </defs>

  <!-- Opción C: 131+221+232+311+322+333+412+423+434 (vista espejo) -->
  <!-- screen_x = 55 + 20a - 10b ; screen_y = 135 - 10b - 20c -->
  <!-- Render order: y desc, z asc, x desc -->
  <!-- y=3 (back row) -->
  <!-- (1,3,1) → (0,2,0): (35, 115) -->
  <use href="#cubeUnit" x="35" y="115"/>
  <!-- (2,3,2) → (1,2,1): (55, 95) -->
  <use href="#cubeUnit" x="55" y="95"/>
  <!-- (3,3,3) → (2,2,2): (75, 75) -->
  <use href="#cubeUnit" x="75" y="75"/>
  <!-- (4,3,4) → (3,2,3): (95, 55) -->
  <use href="#cubeUnit" x="95" y="55"/>
  <!-- y=2 -->
  <!-- (2,2,1) → (1,1,0): (65, 125) -->
  <use href="#cubeUnit" x="65" y="125"/>
  <!-- (3,2,2) → (2,1,1): (85, 105) -->
  <use href="#cubeUnit" x="85" y="105"/>
  <!-- (4,2,3) → (3,1,2): (105, 85) -->
  <use href="#cubeUnit" x="105" y="85"/>
  <!-- y=1 (front) -->
  <!-- (3,1,1) → (2,0,0): (95, 135) -->
  <use href="#cubeUnit" x="95" y="135"/>
  <!-- (4,1,2) → (3,0,1): (115, 115) -->
  <use href="#cubeUnit" x="115" y="115"/>
</svg>
