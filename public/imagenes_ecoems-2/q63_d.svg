<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="220" height="220" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<defs>
    <!-- Cubo en proyección cabinet con cámara un poco más elevada -->
    <!-- depth offset = (10, -14) en vez de (10, -10): se ve más la cara superior -->
    <symbol id="cubeUnit" overflow="visible">
      <polygon points="0,0 20,0 20,-20 0,-20" fill="#c9bda3" stroke="#1f1a16" stroke-width="1" stroke-linejoin="round"/>
      <polygon points="20,0 30,-14 30,-34 20,-20" fill="#a89880" stroke="#1f1a16" stroke-width="1" stroke-linejoin="round"/>
      <polygon points="0,-20 20,-20 30,-34 10,-34" fill="#efe7d8" stroke="#1f1a16" stroke-width="1" stroke-linejoin="round"/>
    </symbol>
  </defs>

  <!-- Opción D: cresta diagonal — pico de altura 4 a lo largo de la diagonal -->
  <!-- screen_x = 30 + 20a + 10b ; screen_y = 150 - 14b - 20c -->
  <!-- Render order: y desc, z asc, x asc -->
  <!-- y=4 (back row) -->
  <use href="#cubeUnit" x="60" y="108"/>
  <use href="#cubeUnit" x="80" y="88"/>
  <use href="#cubeUnit" x="100" y="68"/>
  <!-- y=3 -->
  <use href="#cubeUnit" x="50" y="102"/>
  <use href="#cubeUnit" x="70" y="82"/>
  <use href="#cubeUnit" x="90" y="62"/>
  <!-- y=2 -->
  <use href="#cubeUnit" x="40" y="96"/>
  <use href="#cubeUnit" x="60" y="76"/>
  <!-- y=1 (front) -->
  <use href="#cubeUnit" x="30" y="90"/>
</svg>
