<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 180" width="260" height="180" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Gráfica d(m) vs t(s) del patinador.
     Sistema: origen en (50, 140). Escala: 12 px/s en x, 7 px/m en y.
     Puntos clave: (0,0)=(50,140) · (5,8)=(110,84) · (12,8)=(194,84) · (15,16)=(230,28). -->

  <g stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round">
    <!-- Eje x con flecha -->
    <line x1="40" y1="140" x2="242" y2="140"/>
    <polygon points="242,140 236,137 236,143" fill="currentColor" stroke="none"/>
    <!-- Eje y con flecha -->
    <line x1="50" y1="150" x2="50" y2="22"/>
    <polygon points="50,22 47,27 53,27" fill="currentColor" stroke="none"/>

    <!-- Líneas punteadas auxiliares -->
    <line x1="110" y1="84" x2="110" y2="140" stroke-dasharray="2.5,2.5"/>
    <line x1="194" y1="84" x2="194" y2="140" stroke-dasharray="2.5,2.5"/>
    <line x1="230" y1="28" x2="230" y2="140" stroke-dasharray="2.5,2.5"/>
    <line x1="50"  y1="84" x2="194" y2="84"  stroke-dasharray="2.5,2.5"/>
    <line x1="50"  y1="28" x2="230" y2="28"  stroke-dasharray="2.5,2.5"/>

    <!-- Gráfica piecewise: (0,0) → (5,8) → (12,8) → (15,16) -->
    <polyline points="50,140 110,84 194,84 230,28" stroke-width="1.8"/>
  </g>

  <!-- Labels de ejes (separados de los números de las marcas) -->
  <text x="8" y="20" font-size="10">d(m)</text>
  <text x="246" y="156" font-size="10">t(s)</text>

  <!-- Marcas en y (a la izquierda del eje) -->
  <text x="44" y="32" font-size="10" text-anchor="end">16</text>
  <text x="44" y="88" font-size="10" text-anchor="end">8</text>
  <text x="44" y="152" font-size="10" text-anchor="end">0</text>

  <!-- Marcas en x (debajo del eje) -->
  <text x="110" y="156" font-size="10" text-anchor="middle">5</text>
  <text x="194" y="156" font-size="10" text-anchor="middle">12</text>
  <text x="230" y="156" font-size="10" text-anchor="middle">15</text>
</svg>
