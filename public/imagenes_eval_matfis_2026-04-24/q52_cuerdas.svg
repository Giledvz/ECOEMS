<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 360" width="700" height="360" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ahBlack" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
    <pattern id="hatchCeil" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#555" stroke-width="0.9"/>
    </pattern>
  </defs>

  <rect width="700" height="360" fill="#ffffff"/>

  <!-- Techo con hachurado arriba -->
  <rect x="60" y="40" width="580" height="22" fill="url(#hatchCeil)"/>
  <line x1="60" y1="62" x2="640" y2="62" stroke="#1a1a1a" stroke-width="2.2"/>

  <!-- Cuerdas (desde los puntos de apoyo hasta la masa) -->
  <line x1="150" y1="62" x2="350" y2="177" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="550" y1="62" x2="350" y2="177" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Etiquetas de tensión T -->
  <text x="232" y="115" text-anchor="middle" font-size="20" font-style="italic" fill="#1d4ed8">T</text>
  <text x="468" y="115" text-anchor="middle" font-size="20" font-style="italic" fill="#1d4ed8">T</text>

  <!-- Arcos de 30° con la horizontal -->
  <path d="M 195 62 A 45 45 0 0 1 189 84.5" fill="none" stroke="#c2410c" stroke-width="1.8"/>
  <text x="213" y="82" font-size="16" fill="#c2410c">30°</text>

  <path d="M 505 62 A 45 45 0 0 0 511 84.5" fill="none" stroke="#c2410c" stroke-width="1.8"/>
  <text x="487" y="82" text-anchor="end" font-size="16" fill="#c2410c">30°</text>

  <!-- Masa -->
  <rect x="308" y="177" width="84" height="48" fill="#e8edf3" stroke="#1a1a1a" stroke-width="1.8" rx="1.5"/>
  <text x="350" y="207" text-anchor="middle" font-size="18" font-weight="500" fill="#1a1a1a">8 kg</text>

  <!-- Peso W = mg -->
  <line x1="350" y1="225" x2="350" y2="310" stroke="#1a1a1a" stroke-width="2.4" marker-end="url(#ahBlack)"/>
  <text x="365" y="285" font-size="18">
    <tspan font-style="italic">W</tspan><tspan> = </tspan><tspan font-style="italic">mg</tspan>
  </text>
</svg>
