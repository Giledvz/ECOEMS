<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 320" width="700" height="320" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ahOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#c2410c"/>
    </marker>
    <pattern id="hatch" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#555" stroke-width="0.9"/>
    </pattern>
  </defs>

  <rect width="700" height="320" fill="#ffffff"/>

  <!-- Espejo (superficie) -->
  <line x1="60" y1="220" x2="640" y2="220" stroke="#1a1a1a" stroke-width="2.2"/>
  <rect x="60" y="220" width="580" height="22" fill="url(#hatch)"/>

  <!-- Normal (línea punteada) -->
  <line x1="350" y1="220" x2="350" y2="40" stroke="#1a1a1a" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="362" y="55" font-size="17" fill="#444" font-style="italic">normal</text>

  <!-- Rayo incidente (llega al punto de incidencia con 25° sobre la superficie) -->
  <line x1="130" y1="125" x2="350" y2="220" stroke="#c2410c" stroke-width="2.4" marker-end="url(#ahOrange)"/>
  <text x="148" y="108" font-size="17" fill="#c2410c">rayo incidente</text>

  <!-- Rayo reflejado -->
  <line x1="350" y1="220" x2="570" y2="125" stroke="#c2410c" stroke-width="2.4" marker-end="url(#ahOrange)"/>
  <text x="555" y="108" font-size="17" fill="#c2410c" text-anchor="end">rayo reflejado</text>

  <!-- Arco 25° en el lado izquierdo -->
  <path d="M 290 220 A 60 60 0 0 1 295.6 194.6" fill="none" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="278" y="208" text-anchor="end" font-size="17" fill="#1d4ed8">25°</text>

  <!-- Arco 25° en el lado derecho -->
  <path d="M 404.4 194.6 A 60 60 0 0 1 410 220" fill="none" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="422" y="208" font-size="17" fill="#1d4ed8">25°</text>

  <!-- Punto de incidencia -->
  <circle cx="350" cy="220" r="3.5" fill="#1a1a1a"/>
</svg>
