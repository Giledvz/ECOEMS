<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 340" width="700" height="340" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ahBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>
    </marker>
    <marker id="ahGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6.5" markerHeight="6.5" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
    </marker>
    <pattern id="hatchFloor" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#555" stroke-width="0.9"/>
    </pattern>
  </defs>

  <rect width="700" height="340" fill="#ffffff"/>

  <!-- Superficie -->
  <line x1="60" y1="220" x2="640" y2="220" stroke="#1a1a1a" stroke-width="2.2"/>
  <rect x="60" y="220" width="580" height="22" fill="url(#hatchFloor)"/>

  <!-- Carrito -->
  <rect x="130" y="180" width="100" height="40" fill="#e8edf3" stroke="#1a1a1a" stroke-width="1.8" rx="2"/>
  <!-- Ruedas -->
  <circle cx="150" cy="222" r="8" fill="#334155" stroke="#1a1a1a" stroke-width="1.5"/>
  <circle cx="210" cy="222" r="8" fill="#334155" stroke="#1a1a1a" stroke-width="1.5"/>

  <!-- Vector F a 30° sobre la horizontal -->
  <line x1="180" y1="200" x2="318.6" y2="120" stroke="#1d4ed8" stroke-width="2.5" marker-end="url(#ahBlue)"/>
  <text x="326" y="118" font-size="19" fill="#1d4ed8">
    <tspan font-style="italic">F</tspan><tspan> = 50 N</tspan>
  </text>

  <!-- Arco de 30° -->
  <path d="M 230 200 A 50 50 0 0 0 223.3 175" fill="none" stroke="#c2410c" stroke-width="1.8"/>
  <text x="238" y="194" font-size="16" fill="#c2410c">30°</text>

  <!-- Desplazamiento d (flecha verde debajo) -->
  <line x1="130" y1="280" x2="530" y2="280" stroke="#16a34a" stroke-width="2.4" marker-end="url(#ahGreen)"/>
  <text x="330" y="306" text-anchor="middle" font-size="18" fill="#16a34a">
    <tspan font-style="italic">d</tspan><tspan> = 12 m</tspan>
  </text>
  <!-- Líneas guía punteadas para mostrar posición inicial/final del carrito -->
  <line x1="130" y1="250" x2="130" y2="275" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="530" y1="250" x2="530" y2="275" stroke="#16a34a" stroke-width="1" stroke-dasharray="3 3"/>
</svg>
