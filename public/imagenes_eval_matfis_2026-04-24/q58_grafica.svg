<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" width="700" height="500" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="axArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="700" height="500" fill="#ffffff"/>

  <!-- Cuadrícula -->
  <g stroke="#d1d5db" stroke-width="0.8">
    <!-- Verticales (cada 1 s) -->
    <line x1="162.86" y1="430" x2="162.86" y2="60"/>
    <line x1="245.71" y1="430" x2="245.71" y2="60"/>
    <line x1="328.57" y1="430" x2="328.57" y2="60"/>
    <line x1="411.43" y1="430" x2="411.43" y2="60"/>
    <line x1="494.29" y1="430" x2="494.29" y2="60"/>
    <line x1="577.14" y1="430" x2="577.14" y2="60"/>
    <!-- Horizontales (cada 5 m/s) -->
    <line x1="80" y1="374.29" x2="620" y2="374.29"/>
    <line x1="80" y1="318.57" x2="620" y2="318.57"/>
    <line x1="80" y1="262.86" x2="620" y2="262.86"/>
    <line x1="80" y1="207.14" x2="620" y2="207.14"/>
    <line x1="80" y1="151.43" x2="620" y2="151.43"/>
    <line x1="80" y1="95.71" x2="620" y2="95.71"/>
  </g>

  <!-- Ejes -->
  <line x1="80" y1="430" x2="640" y2="430" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#axArrow)"/>
  <line x1="80" y1="430" x2="80" y2="50" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#axArrow)"/>

  <!-- Tics eje X -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="430" x2="80" y2="436"/>
    <line x1="162.86" y1="430" x2="162.86" y2="436"/>
    <line x1="245.71" y1="430" x2="245.71" y2="436"/>
    <line x1="328.57" y1="430" x2="328.57" y2="436"/>
    <line x1="411.43" y1="430" x2="411.43" y2="436"/>
    <line x1="494.29" y1="430" x2="494.29" y2="436"/>
    <line x1="577.14" y1="430" x2="577.14" y2="436"/>
  </g>

  <!-- Tics eje Y -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="430" x2="74" y2="430"/>
    <line x1="80" y1="374.29" x2="74" y2="374.29"/>
    <line x1="80" y1="318.57" x2="74" y2="318.57"/>
    <line x1="80" y1="262.86" x2="74" y2="262.86"/>
    <line x1="80" y1="207.14" x2="74" y2="207.14"/>
    <line x1="80" y1="151.43" x2="74" y2="151.43"/>
    <line x1="80" y1="95.71" x2="74" y2="95.71"/>
  </g>

  <!-- Números eje X -->
  <g font-size="16" text-anchor="middle" fill="#1a1a1a">
    <text x="80" y="456">0</text>
    <text x="162.86" y="456">1</text>
    <text x="245.71" y="456">2</text>
    <text x="328.57" y="456">3</text>
    <text x="411.43" y="456">4</text>
    <text x="494.29" y="456">5</text>
    <text x="577.14" y="456">6</text>
  </g>

  <!-- Números eje Y -->
  <g font-size="16" text-anchor="end" fill="#1a1a1a">
    <text x="68" y="436">0</text>
    <text x="68" y="380.29">5</text>
    <text x="68" y="324.57">10</text>
    <text x="68" y="268.86">15</text>
    <text x="68" y="213.14">20</text>
    <text x="68" y="157.43">25</text>
    <text x="68" y="101.71">30</text>
  </g>

  <!-- Etiqueta eje X -->
  <text x="350" y="485" text-anchor="middle" font-size="18">
    <tspan>tiempo </tspan><tspan font-style="italic">t</tspan><tspan> (s)</tspan>
  </text>

  <!-- Etiqueta eje Y (rotada) -->
  <text x="30" y="245" text-anchor="middle" font-size="18" transform="rotate(-90 30 245)">
    <tspan>velocidad </tspan><tspan font-style="italic">v</tspan><tspan> (m/s)</tspan>
  </text>

  <!-- Curva de datos -->
  <line x1="80" y1="430" x2="577.14" y2="95.71" stroke="#1d4ed8" stroke-width="2.8"/>

  <!-- Puntos extremos -->
  <circle cx="80" cy="430" r="4.5" fill="#1d4ed8"/>
  <circle cx="577.14" cy="95.71" r="4.5" fill="#1d4ed8"/>
</svg>
