<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="axArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="700" height="460" fill="#ffffff"/>

  <!-- Líneas guía punteadas hasta (5,8), (12,8), (15,16) -->
  <g stroke="#9ca3af" stroke-width="0.9" stroke-dasharray="5 4">
    <line x1="260" y1="400" x2="260" y2="230"/>
    <line x1="512" y1="400" x2="512" y2="230"/>
    <line x1="620" y1="400" x2="620" y2="60"/>
    <line x1="80" y1="230" x2="512" y2="230"/>
    <line x1="80" y1="60" x2="620" y2="60"/>
  </g>

  <!-- Ejes -->
  <line x1="80" y1="400" x2="660" y2="400" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axArrow)"/>
  <line x1="80" y1="400" x2="80" y2="40" stroke="#1a1a1a" stroke-width="2" marker-end="url(#axArrow)"/>

  <!-- Tics eje X -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="400" x2="80" y2="406"/>
    <line x1="260" y1="400" x2="260" y2="406"/>
    <line x1="512" y1="400" x2="512" y2="406"/>
    <line x1="620" y1="400" x2="620" y2="406"/>
  </g>

  <!-- Números eje X -->
  <g font-size="18" text-anchor="middle" fill="#1a1a1a">
    <text x="80" y="425">0</text>
    <text x="260" y="425">5</text>
    <text x="512" y="425">12</text>
    <text x="620" y="425">15</text>
  </g>

  <!-- Tics eje Y -->
  <g stroke="#1a1a1a" stroke-width="1.5">
    <line x1="80" y1="400" x2="74" y2="400"/>
    <line x1="80" y1="230" x2="74" y2="230"/>
    <line x1="80" y1="60" x2="74" y2="60"/>
  </g>

  <!-- Números eje Y -->
  <g font-size="18" text-anchor="end" fill="#1a1a1a">
    <text x="68" y="406">0</text>
    <text x="68" y="236">8</text>
    <text x="68" y="66">16</text>
  </g>

  <!-- Etiquetas de ejes -->
  <text x="80" y="32" text-anchor="middle" font-size="20">
    <tspan font-style="italic">d</tspan><tspan> (m)</tspan>
  </text>
  <text x="680" y="406" font-size="20">
    <tspan font-style="italic">t</tspan><tspan> (s)</tspan>
  </text>

  <!-- Trayectoria: (0,0)→(5,8)→(12,8)→(15,16) → (80,400)→(260,230)→(512,230)→(620,60) -->
  <polyline points="80,400 260,230 512,230 620,60" fill="none" stroke="#1a1a1a" stroke-width="3"/>
</svg>
