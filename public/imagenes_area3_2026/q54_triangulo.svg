<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 540 460" width="540" height="460" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="540" height="460" fill="#ffffff"/>

  <!-- Triángulo: V1=(110,380) ángulo θ (abajo-izq), V2=(430,380) ángulo recto (abajo-der), V3=(430,80) (arriba) -->
  <path d="M 110 380 L 430 380 L 430 80 Z" fill="#f8fafc" stroke="#1a1a1a" stroke-width="2.4"/>

  <!-- Cuadrito de ángulo recto en V2 (abajo-der) -->
  <path d="M 430 360 L 410 360 L 410 380" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- Arco ángulo θ en V1 (entre lado horizontal y la hipotenusa que va arriba-derecha) -->
  <path d="M 170 380 A 60 60 0 0 0 165.4 354.6" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>
  <text x="183" y="365" font-size="24" font-style="italic">θ</text>

  <!-- Etiqueta cateto horizontal = 2 -->
  <text x="270" y="408" text-anchor="middle" font-size="22">2</text>

  <!-- Etiqueta cateto vertical = 3 -->
  <text x="450" y="240" font-size="22">3</text>

  <!-- Etiqueta hipotenusa = √13 -->
  <text x="240" y="220" text-anchor="middle" font-size="22" transform="rotate(-43.15 240 220)">
    <tspan>√</tspan><tspan style="text-decoration:overline">13</tspan>
  </text>

  <!-- Corchete decorativo en cateto horizontal -->
  <line x1="110" y1="400" x2="430" y2="400" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="110" y1="395" x2="110" y2="405" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="430" y1="395" x2="430" y2="405" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- Corchete decorativo en cateto vertical -->
  <line x1="448" y1="80" x2="448" y2="380" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="443" y1="80" x2="453" y2="80" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="443" y1="380" x2="453" y2="380" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- Corchete decorativo en hipotenusa -->
  <line x1="95" y1="367" x2="415" y2="67" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="91" y1="370" x2="99" y2="363" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="411" y1="71" x2="419" y2="64" stroke="#1a1a1a" stroke-width="1.4"/>
</svg>
