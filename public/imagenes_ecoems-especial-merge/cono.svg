<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" width="320" height="300" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Lados del cono (generatriz) -->
  <line x1="160" y1="45" x2="70" y2="250" stroke="currentColor" stroke-width="2.5"/>
  <line x1="160" y1="45" x2="250" y2="250" stroke="currentColor" stroke-width="2.5"/>

  <!-- Base: arco trasero (punteado) y frontal (solido) -->
  <path d="M 70 250 A 90 22 0 0 1 250 250" fill="none" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 5" stroke-opacity="0.7"/>
  <path d="M 70 250 A 90 22 0 0 0 250 250" fill="none" stroke="currentColor" stroke-width="2.5"/>

  <!-- Altura h (punteada) -->
  <line x1="160" y1="45" x2="160" y2="250" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="146" y="160" font-size="20" font-style="italic" text-anchor="middle">h</text>

  <!-- Radio (punteado) -->
  <line x1="160" y1="250" x2="250" y2="250" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 5"/>
  <text x="205" y="270" font-size="18" text-anchor="middle">9</text>

  <!-- Generatriz 15 -->
  <text x="228" y="140" font-size="18" text-anchor="middle">15</text>
</svg>
