<text x="188" y="126" font-size="14" font-style="italic">t</text>
<!-- etiquetas d1,d2,d3 -->
<text x="26" y="36" font-size="10" font-style="italic">d&#8323;</text>
<text x="26" y="56" font-size="10" font-style="italic">d&#8322;</text>
