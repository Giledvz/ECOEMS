<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 340" width="560" height="340" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Bordes externos -->
  <rect x="15" y="20" width="530" height="302" fill="none" stroke="currentColor" stroke-width="2"/>
  <!-- Verticales -->
  <line x1="265" y1="20" x2="265" y2="322" stroke="currentColor" stroke-width="1.5"/>
  <line x1="405" y1="20" x2="405" y2="322" stroke="currentColor" stroke-width="1.5"/>
  <!-- Horizontales de filas -->
  <line x1="15" y1="70" x2="545" y2="70" stroke="currentColor" stroke-width="2"/>
  <line x1="15" y1="106" x2="545" y2="106" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="15" y1="142" x2="545" y2="142" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="15" y1="178" x2="545" y2="178" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="15" y1="214" x2="545" y2="214" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="15" y1="250" x2="545" y2="250" stroke="currentColor" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="15" y1="286" x2="545" y2="286" stroke="currentColor" stroke-width="2"/>

  <!-- Cabecera -->
  <g font-size="14" font-weight="700">
    <text x="140" y="42" text-anchor="middle">Necesidad más</text>
    <text x="140" y="60" text-anchor="middle">insatisfecha</text>
    <text x="335" y="42" text-anchor="middle">Frecuencia</text>
    <text x="335" y="60" text-anchor="middle">absoluta</text>
    <text x="475" y="42" text-anchor="middle">Frecuencia</text>
    <text x="475" y="60" text-anchor="middle">relativa</text>
  </g>

  <!-- Filas -->
  <g font-size="16">
    <text x="28" y="97">Vestido</text>            <text x="335" y="97" text-anchor="middle">13</text> <text x="475" y="97" text-anchor="middle">0.19</text>
    <text x="28" y="133">Alimentación</text>      <text x="335" y="133" text-anchor="middle">10</text> <text x="475" y="133" text-anchor="middle">0.14</text>
    <text x="28" y="169">Seguridad</text>         <text x="335" y="169" text-anchor="middle">16</text> <text x="475" y="169" text-anchor="middle">0.23</text>
    <text x="28" y="205">Aceptación ante los demás</text> <text x="335" y="205" text-anchor="middle">14</text> <text x="475" y="205" text-anchor="middle">0.20</text>
    <text x="28" y="241">Autorrealización</text>  <text x="335" y="241" text-anchor="middle">7</text>  <text x="475" y="241" text-anchor="middle">0.10</text>
    <text x="28" y="277">Descanso</text>          <text x="335" y="277" text-anchor="middle">10</text> <text x="475" y="277" text-anchor="middle">0.14</text>
  </g>
  <!-- Total -->
  <g font-size="16" font-weight="700">
    <text x="28" y="311">Total</text>             <text x="335" y="311" text-anchor="middle">70</text> <text x="475" y="311" text-anchor="middle">1.00</text>
  </g>
</svg>
