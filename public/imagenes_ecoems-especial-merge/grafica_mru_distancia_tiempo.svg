<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 340" width="460" height="340" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Cuadrícula tenue -->
  <g stroke="currentColor" stroke-width="1" stroke-opacity="0.18">
    <line x1="150" y1="80" x2="150" y2="290"/>
    <line x1="230" y1="80" x2="230" y2="290"/>
    <line x1="310" y1="80" x2="310" y2="290"/>
    <line x1="390" y1="80" x2="390" y2="290"/>
    <line x1="70" y1="225" x2="410" y2="225"/>
    <line x1="70" y1="160" x2="410" y2="160"/>
    <line x1="70" y1="95"  x2="410" y2="95"/>
  </g>

  <!-- Eje Y (Distancia) -->
  <line x1="70" y1="290" x2="70" y2="75" stroke="currentColor" stroke-width="2"/>
  <polygon points="70,70 65,82 75,82" fill="currentColor"/>
  <text x="44" y="58" font-size="14" font-weight="600">Distancia (m)</text>

  <!-- Eje X (Tiempo) -->
  <line x1="70" y1="290" x2="410" y2="290" stroke="currentColor" stroke-width="2"/>
  <polygon points="415,290 403,285 403,295" fill="currentColor"/>
  <text x="330" y="330" font-size="14" font-weight="600">Tiempo (s)</text>

  <!-- Marcas y etiquetas eje X: 0,1,2,3,4 -->
  <g font-size="14">
    <text x="64" y="308" text-anchor="end">0</text>
    <line x1="150" y1="285" x2="150" y2="295" stroke="currentColor" stroke-width="2"/><text x="150" y="310" text-anchor="middle">1</text>
    <line x1="230" y1="285" x2="230" y2="295" stroke="currentColor" stroke-width="2"/><text x="230" y="310" text-anchor="middle">2</text>
    <line x1="310" y1="285" x2="310" y2="295" stroke="currentColor" stroke-width="2"/><text x="310" y="310" text-anchor="middle">3</text>
    <line x1="390" y1="285" x2="390" y2="295" stroke="currentColor" stroke-width="2"/><text x="390" y="310" text-anchor="middle">4</text>
  </g>
  <!-- Marcas y etiquetas eje Y: 1,2,3 -->
  <g font-size="14">
    <line x1="65" y1="225" x2="75" y2="225" stroke="currentColor" stroke-width="2"/><text x="58" y="230" text-anchor="end">1</text>
    <line x1="65" y1="160" x2="75" y2="160" stroke="currentColor" stroke-width="2"/><text x="58" y="165" text-anchor="end">2</text>
    <line x1="65" y1="95"  x2="75" y2="95"  stroke="currentColor" stroke-width="2"/><text x="58" y="100" text-anchor="end">3</text>
  </g>

  <!-- Recta del movimiento (MRU): de (0,0) a (3 s, 3 m) -->
  <line x1="70" y1="290" x2="310" y2="95" stroke="currentColor" stroke-width="3"/>
  <circle cx="310" cy="95" r="4" fill="currentColor"/>

  <!-- Guías punteadas hasta (3,3) -->
  <g stroke="currentColor" stroke-width="1.5" stroke-dasharray="4 4" stroke-opacity="0.7">
    <line x1="310" y1="95" x2="310" y2="290"/>
    <line x1="310" y1="95" x2="70" y2="95"/>
  </g>
</svg>
