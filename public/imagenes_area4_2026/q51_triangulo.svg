<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 460" width="580" height="460" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <rect width="580" height="460" fill="#ffffff"/>

  <!-- Triángulo: Q=(120,360) ángulo recto (abajo-izq), R=(120,80) (arriba), P=(440,360) (abajo-der) -->
  <path d="M 120 360 L 120 80 L 440 360 Z" fill="#f8fafc" stroke="#1a1a1a" stroke-width="2.2"/>

  <!-- Cuadrito de ángulo recto en Q -->
  <path d="M 120 340 L 140 340 L 140 360" fill="none" stroke="#1a1a1a" stroke-width="1.8"/>

  <!-- Arco ángulo R (entre RQ vertical-abajo y RP hipotenusa) -->
  <path d="M 120 130 A 50 50 0 0 0 158.4 112.5" fill="none" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="158" y="120" font-size="22" font-weight="600" fill="#1a1a1a">R</text>

  <!-- Arco ángulo P (entre PQ horizontal-izq y PR hipotenusa) -->
  <path d="M 390 360 A 50 50 0 0 0 397.6 327.5" fill="none" stroke="#1d4ed8" stroke-width="1.8"/>
  <text x="395" y="345" text-anchor="end" font-size="22" font-weight="600" fill="#1a1a1a">P</text>

  <!-- Etiqueta Q junto al cuadrito -->
  <text x="148" y="385" font-size="22" font-weight="600">Q</text>

  <!-- Etiqueta lado vertical (cateto opuesto a P) = 3 -->
  <text x="100" y="225" text-anchor="end" font-size="22">3</text>

  <!-- Etiqueta hipotenusa = 5 -->
  <text x="295" y="208" font-size="22" transform="rotate(-41.2 295 208)">5</text>

  <!-- Marcas de corchete en lados (estilo de la PNG) -->
  <line x1="100" y1="80" x2="100" y2="360" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="95" y1="80" x2="105" y2="80" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="95" y1="360" x2="105" y2="360" stroke="#1a1a1a" stroke-width="1.4"/>

  <line x1="120" y1="380" x2="440" y2="380" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="120" y1="375" x2="120" y2="385" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="440" y1="375" x2="440" y2="385" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- Marca decorativa sobre la hipotenusa -->
  <line x1="135" y1="60" x2="455" y2="340" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="131" y1="63" x2="139" y2="56" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="451" y1="343" x2="459" y2="336" stroke="#1a1a1a" stroke-width="1.4"/>
</svg>
