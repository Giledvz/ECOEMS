<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 480" width="320" height="480" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif" font-size="22" font-weight="600">
  <rect width="320" height="480" fill="#ffffff"/>

  <!-- Cadena vertical de 4 C en x=160. C1 (CHO) arriba, C2 y C3 (CHOH), C4 (CH2OH) abajo -->
  <!-- C1: y=80 -->
  <!-- C2: y=180 -->
  <!-- C3: y=280 -->
  <!-- C4: y=380 -->

  <!-- Enlaces verticales C1-C2, C2-C3, C3-C4 -->
  <line x1="160" y1="98" x2="160" y2="162" stroke="#1a1a1a" stroke-width="2.2"/>
  <line x1="160" y1="198" x2="160" y2="262" stroke="#1a1a1a" stroke-width="2.2"/>
  <line x1="160" y1="298" x2="160" y2="362" stroke="#1a1a1a" stroke-width="2.2"/>

  <!-- C1 con CHO (aldehído): C en y=80, O doble enlace arriba, H a la derecha -->
  <!-- O arriba de C1 -->
  <text x="160" y="40" text-anchor="middle">O</text>
  <!-- Doble enlace C=O (dos líneas verticales) -->
  <line x1="156" y1="48" x2="156" y2="68" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="164" y1="48" x2="164" y2="68" stroke="#1a1a1a" stroke-width="2"/>
  <!-- C de C1 -->
  <text x="160" y="88" text-anchor="middle">C</text>
  <!-- Enlace C–H a la derecha -->
  <line x1="178" y1="80" x2="208" y2="80" stroke="#1a1a1a" stroke-width="2.2"/>
  <text x="226" y="88" text-anchor="middle">H</text>

  <!-- C2: H–C–OH (en y=180) -->
  <text x="100" y="188" text-anchor="middle">H</text>
  <line x1="118" y1="180" x2="148" y2="180" stroke="#1a1a1a" stroke-width="2.2"/>
  <!-- C en (160,180) — implícito (no se dibuja, pero los enlaces lo muestran) -->
  <line x1="172" y1="180" x2="202" y2="180" stroke="#1a1a1a" stroke-width="2.2"/>
  <text x="225" y="188" text-anchor="middle">OH</text>

  <!-- C3: H–C–OH (en y=280) -->
  <text x="100" y="288" text-anchor="middle">H</text>
  <line x1="118" y1="280" x2="148" y2="280" stroke="#1a1a1a" stroke-width="2.2"/>
  <line x1="172" y1="280" x2="202" y2="280" stroke="#1a1a1a" stroke-width="2.2"/>
  <text x="225" y="288" text-anchor="middle">OH</text>

  <!-- C4: CH2OH (en y=380). Mostramos solo OH a la derecha como en la PNG; los H son implícitos. -->
  <line x1="172" y1="380" x2="202" y2="380" stroke="#1a1a1a" stroke-width="2.2"/>
  <text x="225" y="388" text-anchor="middle">OH</text>
</svg>
