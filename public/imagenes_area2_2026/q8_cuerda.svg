<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <pattern id="hatchWall" patternUnits="userSpaceOnUse" width="8" height="8" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="8" stroke="#555" stroke-width="0.9"/>
    </pattern>
  </defs>

  <rect width="700" height="280" fill="#ffffff"/>

  <!-- Vibrador (cono negro apuntando hacia la derecha) en el extremo izquierdo -->
  <path d="M 60 130 L 110 110 L 110 150 Z" fill="#1a1a1a" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="60" y1="130" x2="60" y2="100" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="60" y1="130" x2="60" y2="160" stroke="#1a1a1a" stroke-width="2"/>

  <!-- Onda: 5 ciclos entre x=110 y x=590 (longitud total 480 px = 90 cm). Cada ciclo = 96 px = 18 cm. -->
  <!-- Centro y=130, amplitud=28 (control point a -56 / +56 para máximos/mínimos) -->
  <path d="M 110 130
           q 24 -56 48 0 q 24 56 48 0
           q 24 -56 48 0 q 24 56 48 0
           q 24 -56 48 0 q 24 56 48 0
           q 24 -56 48 0 q 24 56 48 0
           q 24 -56 48 0 q 24 56 48 0"
        fill="none" stroke="#1a1a1a" stroke-width="2.4"/>

  <!-- Pared con hachurado a la derecha -->
  <line x1="590" y1="80" x2="590" y2="180" stroke="#1a1a1a" stroke-width="2.4"/>
  <rect x="590" y="80" width="22" height="100" fill="url(#hatchWall)"/>

  <!-- Línea punteada de medición debajo, etiqueta 90 cm -->
  <line x1="110" y1="220" x2="320" y2="220" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="6 5"/>
  <line x1="380" y1="220" x2="590" y2="220" stroke="#1a1a1a" stroke-width="1.4" stroke-dasharray="6 5"/>
  <text x="350" y="227" text-anchor="middle" font-size="20" font-weight="600">90 cm</text>

  <!-- Marcas de extremos en la línea de medición -->
  <line x1="110" y1="212" x2="110" y2="228" stroke="#1a1a1a" stroke-width="1.4"/>
  <line x1="590" y1="212" x2="590" y2="228" stroke="#1a1a1a" stroke-width="1.4"/>
</svg>
