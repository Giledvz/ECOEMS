<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 720" width="700" height="720" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif" font-size="22" font-weight="600">
  <rect width="700" height="720" fill="#ffffff"/>

  <!-- ============== Opción A (centro y=110) ============== -->
  <text x="40" y="118">A)</text>
  <!-- H2O grupo -->
  <text x="100" y="92">H</text>
  <line x1="120" y1="98" x2="148" y2="115" stroke="#1a1a1a" stroke-width="2"/>
  <text x="158" y="118">O</text>
  <line x1="120" y1="135" x2="148" y2="118" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="148">H</text>
  <!-- Línea de puente (discontinua) -->
  <line x1="195" y1="115" x2="305" y2="115" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- H-H -->
  <text x="320" y="118">H</text>
  <line x1="343" y1="113" x2="375" y2="113" stroke="#1a1a1a" stroke-width="2"/>
  <text x="392" y="118">H</text>

  <!-- ============== Opción B (centro y=270): H2O ····· H-O-CH3 ============== -->
  <text x="40" y="278">B)</text>
  <text x="100" y="252">H</text>
  <line x1="120" y1="258" x2="148" y2="275" stroke="#1a1a1a" stroke-width="2"/>
  <text x="158" y="278">O</text>
  <line x1="120" y1="295" x2="148" y2="278" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="308">H</text>
  <!-- Puente -->
  <line x1="195" y1="275" x2="305" y2="275" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- H-O-C(H,H)-H : el primer H -->
  <text x="320" y="278">H</text>
  <line x1="343" y1="273" x2="375" y2="273" stroke="#1a1a1a" stroke-width="2"/>
  <text x="392" y="278">O</text>
  <line x1="416" y1="273" x2="448" y2="273" stroke="#1a1a1a" stroke-width="2"/>
  <text x="465" y="278">C</text>
  <!-- H arriba de C -->
  <text x="465" y="225">H</text>
  <line x1="473" y1="232" x2="473" y2="258" stroke="#1a1a1a" stroke-width="2"/>
  <!-- H abajo de C -->
  <line x1="473" y1="290" x2="473" y2="316" stroke="#1a1a1a" stroke-width="2"/>
  <text x="465" y="335">H</text>
  <!-- H a la derecha de C -->
  <line x1="490" y1="273" x2="522" y2="273" stroke="#1a1a1a" stroke-width="2"/>
  <text x="540" y="278">H</text>

  <!-- ============== Opción C (centro y=450): H2O ····· H-I ============== -->
  <text x="40" y="458">C)</text>
  <text x="100" y="432">H</text>
  <line x1="120" y1="438" x2="148" y2="455" stroke="#1a1a1a" stroke-width="2"/>
  <text x="158" y="458">O</text>
  <line x1="120" y1="475" x2="148" y2="458" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="488">H</text>
  <!-- Puente -->
  <line x1="195" y1="455" x2="305" y2="455" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- H-I -->
  <text x="320" y="458">H</text>
  <line x1="343" y1="453" x2="372" y2="453" stroke="#1a1a1a" stroke-width="2"/>
  <text x="385" y="458" font-style="italic">I</text>

  <!-- ============== Opción D (centro y=620): H2O ····· H-CH3 (metano) ============== -->
  <text x="40" y="628">D)</text>
  <text x="100" y="602">H</text>
  <line x1="120" y1="608" x2="148" y2="625" stroke="#1a1a1a" stroke-width="2"/>
  <text x="158" y="628">O</text>
  <line x1="120" y1="645" x2="148" y2="628" stroke="#1a1a1a" stroke-width="2"/>
  <text x="100" y="658">H</text>
  <!-- Puente -->
  <line x1="195" y1="625" x2="305" y2="625" stroke="#1a1a1a" stroke-width="2" stroke-dasharray="6 5"/>
  <!-- H-C(H,H)-H -->
  <text x="320" y="628">H</text>
  <line x1="343" y1="623" x2="375" y2="623" stroke="#1a1a1a" stroke-width="2"/>
  <text x="392" y="628">C</text>
  <!-- H arriba de C -->
  <text x="392" y="575">H</text>
  <line x1="400" y1="582" x2="400" y2="608" stroke="#1a1a1a" stroke-width="2"/>
  <!-- H abajo de C -->
  <line x1="400" y1="640" x2="400" y2="666" stroke="#1a1a1a" stroke-width="2"/>
  <text x="392" y="685">H</text>
  <!-- H a la derecha de C -->
  <line x1="417" y1="623" x2="449" y2="623" stroke="#1a1a1a" stroke-width="2"/>
  <text x="466" y="628">H</text>
</svg>
