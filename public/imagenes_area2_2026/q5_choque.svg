<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 260" width="700" height="260" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="ahArr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="700" height="260" fill="#ffffff"/>

  <!-- Suelo -->
  <line x1="40" y1="200" x2="660" y2="200" stroke="#1a1a1a" stroke-width="2.4"/>

  <!-- Bola A (más pequeña) -->
  <circle cx="170" cy="170" r="30" fill="#1a1a1a"/>
  <text x="170" y="135" text-anchor="middle" font-size="22" font-weight="600" font-style="italic" fill="#1a1a1a">A</text>

  <!-- Vector v_A → -->
  <line x1="205" y1="160" x2="290" y2="160" stroke="#1a1a1a" stroke-width="2.4" marker-end="url(#ahArr)"/>
  <text x="248" y="148" text-anchor="middle" font-size="20" fill="#1a1a1a">
    <tspan font-style="italic">v</tspan><tspan baseline-shift="sub" font-size="14" font-style="italic">A</tspan>
  </text>

  <!-- Bola B (más grande, doble masa, radio aprox proporcional al volumen^(1/3)≈1.26 — pero visualmente la imagen muestra ~1.5×) -->
  <circle cx="500" cy="155" r="45" fill="#1a1a1a"/>
  <text x="500" y="120" text-anchor="middle" font-size="22" font-weight="600" font-style="italic" fill="#1a1a1a">B</text>
</svg>
