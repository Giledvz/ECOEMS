<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 260" width="340" height="276" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
  <!-- Gráfica velocidad-tiempo: (a) decrece, (b) constante, (c) crece -->
  <!-- Rejilla punteada uniforme 35×35 (6 columnas × 5 filas) -->
  <g stroke="currentColor" stroke-width="1" opacity="0.32" stroke-dasharray="4 4">
    <!-- verticales: x = 90,125,160,195,230,265 (de y=40 a x-axis y=215) -->
    <line x1="90"  y1="40" x2="90"  y2="215"/>
    <line x1="125" y1="40" x2="125" y2="215"/>
    <line x1="160" y1="40" x2="160" y2="215"/>
    <line x1="195" y1="40" x2="195" y2="215"/>
    <line x1="230" y1="40" x2="230" y2="215"/>
    <line x1="265" y1="40" x2="265" y2="215"/>
    <!-- horizontales: y = 40,75,110,145,180 (de y-axis x=55 a x=265) -->
    <line x1="55" y1="40"  x2="265" y2="40"/>
    <line x1="55" y1="75"  x2="265" y2="75"/>
    <line x1="55" y1="110" x2="265" y2="110"/>
    <line x1="55" y1="145" x2="265" y2="145"/>
    <line x1="55" y1="180" x2="265" y2="180"/>
  </g>
  <!-- Ejes -->
  <g stroke="currentColor" stroke-width="2" fill="none">
    <line x1="55" y1="30" x2="55" y2="215"/>
    <line x1="55" y1="215" x2="292" y2="215"/>
  </g>
  <polygon points="55,20 49,34 61,34" fill="currentColor"/>
  <polygon points="301,215 287,209 287,221" fill="currentColor"/>
  <!-- Curva de velocidad (termina dentro de la rejilla, en x=265) -->
  <polyline points="55,110 125,180 195,180 265,75" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Etiquetas centradas sobre su línea vertical (a→90, b→160, c→230) -->
  <g font-size="15" font-style="italic" text-anchor="middle">
    <text x="90" y="120">(a)</text>
    <text x="160" y="202">(b)</text>
    <text x="230" y="100">(c)</text>
  </g>
  <!-- Etiquetas de ejes -->
  <text x="22" y="125" font-size="15" font-weight="bold" text-anchor="middle" transform="rotate(-90 22 125)">Velocidad</text>
  <text x="175" y="245" font-size="15" font-weight="bold" text-anchor="middle">Tiempo</text>
</svg>
