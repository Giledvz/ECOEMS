<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 170 110" width="170" height="110" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Opción D: papel desdoblado con 2 formas, cada una = un semicírculo superior (∩)
     + un semicírculo inferior (∪) separados por un pequeño hueco vertical.
     Rectángulo 130×70. Radio 12, gap vertical entre mitades = 8 px. -->

  <g stroke="currentColor" stroke-width="1.6" fill="none" stroke-linejoin="round" stroke-linecap="round">
    <!-- Rectángulo 130×70 en (20,20) a (150,90). -->
    <rect x="20" y="20" width="130" height="70"/>

    <!-- Forma izquierda en cx=50: semicírculo arriba flat y=44 curva sube a 32,
         semicírculo abajo flat y=66 curva baja a 78. Gap vertical = 22. -->
    <path d="M 38,44 A 12,12 0 0 1 62,44 Z"/>
    <path d="M 38,66 A 12,12 0 0 0 62,66 Z"/>

    <!-- Forma derecha en cx=120: mismo patrón. -->
    <path d="M 108,44 A 12,12 0 0 1 132,44 Z"/>
    <path d="M 108,66 A 12,12 0 0 0 132,66 Z"/>
  </g>
</svg>
