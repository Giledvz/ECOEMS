<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 166" width="260" height="166" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- 6 triángulos isósceles separados, arreglo piramidal (3 + 2 + 1).
     Cada triángulo: base 70, ángulos base 50° → altura = 35·tan(50°) ≈ 42.
     Gap horizontal y vertical entre triángulos: 8 px. -->

  <g stroke="currentColor" stroke-width="1.8" fill="none" stroke-linejoin="round">
    <!-- Fila inferior (3) -->
    <polygon points="17,154 87,154 52,112"/>
    <polygon points="95,154 165,154 130,112"/>
    <polygon points="173,154 243,154 208,112"/>
    <!-- Fila media (2) -->
    <polygon points="56,104 126,104 91,62"/>
    <polygon points="134,104 204,104 169,62"/>
    <!-- Cima (1) -->
    <polygon points="95,54 165,54 130,12"/>
  </g>
</svg>
