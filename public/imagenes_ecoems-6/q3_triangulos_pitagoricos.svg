<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 230" width="520" height="230" font-family="'Latin Modern Roman', Georgia, 'Times New Roman', serif">
<!-- Tres triángulos rectángulos en escala. Escala uniforme: 1 unidad = 12 px.
     Marca de ángulo recto proporcional a cada triángulo (no fija). -->

  <!-- Triángulo 1: 3-4-5  -> alto 36, base 48 | marca 6px -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="40,190 40,154 88,190"/>
  </g>
  <polyline points="40,184 46,184 46,190" stroke="currentColor" stroke-width="1.4" fill="none"/>
  <text x="32" y="176" font-size="14" text-anchor="end">3</text>
  <text x="64" y="206" font-size="14" text-anchor="middle">4</text>
  <text x="70" y="166" font-size="14" font-style="italic">5</text>

  <!-- Triángulo 2: 6-8-10 -> alto 72, base 96 | marca 10px -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="150,190 150,118 246,190"/>
  </g>
  <polyline points="150,180 160,180 160,190" stroke="currentColor" stroke-width="1.4" fill="none"/>
  <text x="142" y="158" font-size="14" text-anchor="end">6</text>
  <text x="198" y="206" font-size="14" text-anchor="middle">8</text>
  <text x="206" y="148" font-size="14" font-style="italic">10</text>

  <!-- Triángulo 3: 8-15-17 -> alto 96, base 180 | marca 14px -->
  <g stroke="currentColor" stroke-width="2" fill="none" stroke-linejoin="round">
    <polygon points="310,190 310,94 490,190"/>
  </g>
  <polyline points="310,176 324,176 324,190" stroke="currentColor" stroke-width="1.4" fill="none"/>
  <text x="302" y="146" font-size="14" text-anchor="end">8</text>
  <text x="400" y="206" font-size="14" text-anchor="middle">15</text>
  <text x="410" y="132" font-size="14" font-style="italic">17</text>
</svg>
